<!doctype html><html lang="ko"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>오늘의 샐러드</title><style>
:root{--g:#24753a;--gd:#164d28;--lg:#eaf6ed;--bg:#f5f7f6;--tx:#202624;--mu:#68716d;--ln:#dfe6e1}*{box-sizing:border-box}body{margin:0;background:var(--bg);color:var(--tx);font:17px/1.58 -apple-system,BlinkMacSystemFont,"Segoe UI","Noto Sans KR",sans-serif}.wrap{max-width:780px;margin:auto;padding:20px 16px 60px}.hero,.card{padding:23px;border-radius:23px;margin-bottom:15px}.hero{color:#fff;background:linear-gradient(135deg,var(--gd),var(--g))}.card{background:#fff;border:1px solid var(--ln);box-shadow:0 8px 24px #183f2710}h1,h2,p{margin-top:0}h1{font-size:2.2rem;margin-bottom:7px}h2{font-size:1.4rem;margin-bottom:7px}.muted{color:var(--mu);font-size:.96rem}.grid{display:grid;grid-template-columns:repeat(2,1fr);gap:9px}.chips,.actions{display:flex;gap:9px;flex-wrap:wrap}.pick,.chip,.btn{font:inherit;font-weight:750;border:1px solid var(--ln);border-radius:14px;background:#fff;padding:11px;cursor:pointer}.pick{min-height:60px}.pick.active,.chip.active{color:#145526;background:var(--lg);border-color:var(--g)}.random{grid-column:1/-1}.primary{color:#fff!important;background:var(--g)!important;border-color:var(--g)!important}.wide{width:100%;min-height:58px}.summary{display:grid;gap:8px}.summary div{display:grid;grid-template-columns:115px 1fr;gap:10px}.summary strong{color:#145526}.hidden{display:none}.badge{display:inline-block;padding:6px 10px;border-radius:99px;background:var(--lg);color:#145526;font-size:.85rem;font-weight:850}.order{margin:14px 0;border:1px solid var(--ln);border-radius:15px;overflow:hidden}.line{display:flex;justify-content:space-between;gap:12px;padding:13px 14px;border-bottom:1px solid var(--ln)}.line:last-child{border:0}.total{display:flex;justify-content:space-between;padding:16px;border-radius:14px;color:#fff;background:var(--gd);font-weight:900}.notice{margin-top:13px;padding:13px;border-radius:13px;background:#fff6dd;color:#704600;font-size:.92rem}.modalbg{display:none;position:fixed;inset:0;z-index:5;background:#0008;align-items:flex-end}.modalbg.open{display:flex}.modal{width:min(780px,100%);max-height:92vh;overflow:auto;margin:auto;padding:22px;background:#fff;border-radius:25px 25px 0 0}.field{margin:21px 0}.field>strong{display:block;margin-bottom:10px}.savebar{position:sticky;bottom:0;padding:13px 0;background:#fff}.history article{padding:12px 0;border-bottom:1px solid var(--ln)}@media(min-width:650px){.stores{grid-template-columns:repeat(3,1fr)}.modalbg{align-items:center;padding:20px}.modal{border-radius:25px}}
</style></head><body><main class="wrap"><section class="hero"><h1>오늘의 샐러드</h1><p>식사 목적별 열량·단백질 기준과 개인 취향을 반영해 추천합니다.</p><button class="btn" id="open">⚙ 취향 설정</button></section><section class="card"><h2>저장된 취향</h2><div id="summary"></div></section><section class="card"><h2>1. 매장 선택</h2><div class="grid stores" id="stores"></div></section><section class="card"><h2>2. 식사 목적</h2><p class="muted" id="target"></p><div class="grid" id="goals"></div></section><button class="btn primary wide" id="go">영양정보로 메뉴 추천받기</button><section class="card hidden" id="result"></section><section class="card"><h2>최근 결정</h2><div class="history" id="history"></div></section></main><div class="modalbg" id="modal"><div class="modal"><h2>내 취향 설정</h2><div class="field"><strong>좋아하는 단백질</strong><div class="chips" id="proteins"></div></div><div class="field"><strong>좋아하는 추가 재료</strong><div class="chips" id="extras"></div></div><div class="field"><strong>제외 재료</strong><div class="chips" id="excluded"></div></div><div class="field"><strong>써브웨이 선호 빵</strong><div class="grid" id="breads"></div></div><div class="field"><strong>매장별 개인 취향</strong><div class="chips" id="storePrefs"></div></div><div class="savebar actions"><button class="btn" id="close">닫기</button><button class="btn" id="reset">초기화</button><button class="btn primary" id="save">취향 저장</button></div></div></div>
<script>
const L={chicken:"닭고기",pork:"돼지고기",beef:"소고기",salmon:"연어",tuna:"참치",shrimp:"새우",egg:"계란",tofu:"두부",avocado:"아보카도",pasta:"파스타면",buckwheat:"메밀면",grain:"곡물밥",mushroom:"버섯",sweetPotato:"고구마",pumpkin:"단호박",corn:"옥수수",cheese:"치즈",chickpea:"병아리콩",edamame:"에다마메",cucumber:"오이",carrot:"당근",broccoli:"브로콜리",potato:"감자",tortilla:"또띠아칩",seaweed:"해초",natto:"낫또",onion:"양파",tomato:"토마토",olive:"올리브",nuts:"견과류",mayo:"마요네즈",spicy:"매운 재료",diet:"다이어트",protein:"고단백",light:"가볍게",filling:"든든하게",balanced:"균형 있게",any:"아무거나",flatbread:"플랫브레드",white:"화이트",wheat:"위트",parmesan:"파마산 오레가노",honeyOat:"허니오트",avoidPrepPork:"프레퍼스 돼지고기 덜 추천",avoidPrepRice:"프레퍼스 밥 메뉴 덜 추천"};
const M=(id,name,price,ing,kcal,protein,carbs,fat,sauce,src)=>({id,name,price,ing,n:{kcal,protein,carbs,fat},sauce,src});
const S=[
{id:"prep",name:"프레퍼스",branch:"마곡나루역점",menus:[M("pcp","치킨 샐러드 파스타",8900,["chicken","pasta"],411,43,49,3,"발사믹 계열","공식 단백질·공개 영양성분"),M("ppp","포크 샐러드 파스타",8900,["pork","pasta"],437,44,50,7,"발사믹 계열","공식 단백질·공개 영양성분"),M("pbp","비프 샐러드 파스타",13900,["beef","pasta"],578,50,54,18,"발사믹 계열","공식 단백질·공개 영양성분"),M("pdt","치킨 데리야끼 덮밥",9900,["chicken","grain"],492,44,74,4,"데리야끼","공식 단백질·공개 영양성분"),M("pcc","치킨 커리 덮밥",9900,["chicken","grain","carrot","broccoli"],591,44,88,7,"커리","공식 메뉴·공개 영양성분"),M("ppc","포크 커리 덮밥",10900,["pork","grain","carrot","broccoli"],622,45,88,10,"커리","공식 메뉴·공개 영양성분"),M("pbc","비프 커리 덮밥",13900,["beef","grain","carrot","broccoli"],731,51,89,19,"커리","공식 메뉴·공개 영양성분")]},
{id:"salady",name:"샐러디",branch:"마곡나루역점",menus:[M("sr","로스트닭다리살 샐러디",12000,["chicken"],259.2,13.2,29.7,9.6,"기본 구성","샐러디 공식 영양성분표"),M("ss","그라브락스 연어 샐러디",13700,["salmon"],247.3,21,7.8,14.4,"기본 구성","샐러디 공식 영양성분표"),M("sb","우삼겹메밀면 누들볼",10700,["beef","buckwheat","onion"],406.6,18,36.1,21.2,"기본 구성","샐러디 공식 영양성분표"),M("sp","고소삼겹 들기름파스타 누들볼",10900,["pork","pasta"],445.3,16,42.8,24,"기본 구성","샐러디 공식 영양성분표")]},
{id:"poke",name:"포케올데이",branch:"마곡나루역점",menus:[M("pt","곡물밥 스파이시 참치 포케",12900,["tuna","grain","spicy"],622.7,33.5,68,17.5,"유자 간장","공식 계산기 구성요소 합산"),M("pd","곡물밥 훈제오리 포케",11900,["grain"],732,25.2,70,31.6,"비건 크리미 어니언","공식 계산기 구성요소 합산")]},
{id:"slow",name:"슬로우캘리",branch:"마곡나루점",menus:[M("sl","클래식 연어 포케",12500,["salmon","grain","seaweed"],569,30,79,15,"클래식 간장","공개 영양성분 자료")]},
{id:"subway",name:"써브웨이",branch:"마곡나루역점",menus:[M("se","에그마요 15cm",6200,["egg","mayo","onion","tomato","olive"],453,16.9,44,25,"스위트 어니언","위트 기준 영양표+소스"),M("sbm","이탈리안 비엠티 15cm",7200,["pork","onion","tomato","olive"],403,21,44,16,"머스타드","위트 기준 영양표+소스"),M("src","로티세리 바비큐 치킨 15cm",7800,["chicken","onion","tomato","olive"],328,29.1,39,6,"레드와인 식초","위트 기준 영양표+소스"),M("ssh","쉬림프 15cm",8200,["shrimp","onion","tomato","olive"],281,16.3,41,3.1,"스위트칠리","위트 기준 영양표+소스"),M("sst","스테이크 & 치즈 15cm",8500,["beef","onion"],451.5,28.5,42,18,"치폴레","위트 기준 영양표+소스")]}
];
const T={diet:{min:250,max:450,p:18},protein:{min:300,max:700,p:30},light:{min:200,max:400,p:12},filling:{min:500,max:800,p:25},balanced:{min:350,max:650,p:20},any:{min:0,max:9999,p:0}},PK="salad.preferences",HK="salad.history",DEF=()=>({proteins:["chicken","salmon","egg"],extras:["avocado","pasta"],excluded:["seaweed","natto"],bread:"flatbread",storePrefs:["avoidPrepPork","avoidPrepRice"]});
const read=(k,d)=>{try{return JSON.parse(localStorage.getItem(k))??d}catch{return d}},$=x=>document.getElementById(x),fmt=n=>n.toLocaleString("ko-KR")+"원",labs=a=>a.map(x=>L[x]||x).join(" · ");let pref={...DEF(),...read(PK,{})},draft=structuredClone(pref),sid="random",goal="balanced",current=null;
function summary(){$("summary").innerHTML=`<div class="summary"><div><strong>단백질</strong><span>${labs(pref.proteins)}</span></div><div><strong>추가 재료</strong><span>${labs(pref.extras)}</span></div><div><strong>제외 재료</strong><span>${labs(pref.excluded)}</span></div><div><strong>써브웨이 빵</strong><span>${L[pref.bread]}</span></div><div><strong>매장 취향</strong><span>${labs(pref.storePrefs)}</span></div></div>`}function stores(){$("stores").innerHTML=`<button class="pick random ${sid==="random"?"active":""}" data-s="random">🎲 전체 매장에서 추천</button>`+S.map(x=>`<button class="pick ${sid===x.id?"active":""}" data-s="${x.id}">${x.name}<br><small>${x.branch}</small></button>`).join("");document.querySelectorAll("[data-s]").forEach(b=>b.onclick=()=>{sid=b.dataset.s;stores()})}function goals(){$("goals").innerHTML=Object.keys(T).map(x=>`<button class="pick ${goal===x?"active":""}" data-g="${x}">${L[x]}</button>`).join("");document.querySelectorAll("[data-g]").forEach(b=>b.onclick=()=>{goal=b.dataset.g;goals();target()})}function target(){let t=T[goal];$("target").textContent=t.min?`목표 ${t.min}~${t.max}kcal · 단백질 ${t.p}g 이상 우선`:"칼로리 제한 없이 취향을 우선합니다."}
function chips(id,a,k){$(id).innerHTML=a.map(x=>`<button class="chip ${draft[k].includes(x)?"active":""}" data-k="${k}" data-v="${x}">${L[x]}</button>`).join("");$(id).querySelectorAll("button").forEach(b=>b.onclick=()=>{let {k,v}=b.dataset;draft[k]=draft[k].includes(v)?draft[k].filter(x=>x!==v):[...draft[k],v];if(k==="extras")draft.excluded=draft.excluded.filter(x=>x!==v);if(k==="excluded")draft.extras=draft.extras.filter(x=>x!==v);prefs()})}function prefs(){chips("proteins",["chicken","pork","beef","salmon","tuna","shrimp","egg","tofu"],"proteins");chips("extras",["avocado","pasta","buckwheat","grain","mushroom","sweetPotato","pumpkin","corn","cheese","chickpea","edamame","cucumber","carrot","broccoli","potato","tortilla"],"extras");chips("excluded",["seaweed","natto","onion","tomato","olive","nuts","mayo","spicy"],"excluded");chips("storePrefs",["avoidPrepPork","avoidPrepRice"],"storePrefs");$("breads").innerHTML=["flatbread","white","wheat","parmesan","honeyOat"].map(x=>`<button class="pick ${draft.bread===x?"active":""}" data-b="${x}">${L[x]}</button>`).join("");document.querySelectorAll("[data-b]").forEach(b=>b.onclick=()=>{draft.bread=b.dataset.b;prefs()})}
function score(s,m){let t=T[goal],n=m.n,v=0;if(n.kcal>=t.min&&n.kcal<=t.max)v+=40;else v-=Math.min(35,(n.kcal<t.min?t.min-n.kcal:n.kcal-t.max)/8);v+=n.protein>=t.p?25+Math.min(10,(n.protein-t.p)/2):-(t.p-n.protein)*1.5;v+=m.ing.filter(x=>pref.proteins.includes(x)).length*6+m.ing.filter(x=>pref.extras.includes(x)).length*3;if(s.id==="prep"&&pref.storePrefs.includes("avoidPrepPork")&&m.ing.includes("pork"))v-=15;if(s.id==="prep"&&pref.storePrefs.includes("avoidPrepRice")&&m.ing.includes("grain"))v-=12;return v}function recommend(){let ss=sid==="random"?S:S.filter(x=>x.id===sid),c=[];ss.forEach(s=>s.menus.filter(m=>!m.ing.some(x=>pref.excluded.includes(x))).forEach(m=>c.push({s,m,score:score(s,m)})));if(!c.length)return alert("조건에 맞는 메뉴가 없습니다.");c.sort((a,b)=>b.score-a.score);let top=c.slice(0,3),r=Math.random(),i=r<.7?0:r<.9?Math.min(1,top.length-1):Math.min(2,top.length-1);current=top[i];if(current.m.id===(window.lastId||"")&&top.length>1)current=top[1];window.lastId=current.m.id;result()}
function result(){let {s,m,score}=current,n=m.n,t=T[goal],ko=n.kcal>=t.min&&n.kcal<=t.max,po=n.protein>=t.p,bread=s.id==="subway"?pref.bread:null;$("result").innerHTML=`<span class="badge">영양정보 기반 추천</span><h2>${s.name} · ${m.name}</h2><p class="muted">${s.branch} · 적합도 ${Math.round(score)}점</p><div class="order"><div class="line"><span>기본 메뉴</span><strong>${fmt(m.price)}</strong></div>${bread?`<div class="line"><span>선호 빵</span><strong>${L[bread]}</strong></div>`:""}<div class="line"><span>소스</span><strong>${m.sauce}</strong></div></div><div class="total"><span>총 예상 금액</span><span>${fmt(m.price)}</span></div><div class="order"><div class="line"><span>열량</span><strong>${Math.round(n.kcal)} kcal</strong></div><div class="line"><span>단백질</span><strong>${n.protein} g</strong></div><div class="line"><span>탄수화물</span><strong>${n.carbs} g</strong></div><div class="line"><span>지방</span><strong>${n.fat} g</strong></div></div><div class="notice"><strong>${L[goal]} 기준</strong><br>${ko?"✓ 열량 기준 충족":"△ 열량 기준과 차이 있음"} · ${po?"✓ 단백질 기준 충족":"△ 단백질 기준 미달"}</div><div class="actions" style="margin-top:14px"><button class="btn primary" id="approve">이 메뉴로 결정</button><button class="btn" id="again">다시 추천</button></div><div class="notice">영양 기준: ${m.src}<br>실제 조리량과 지점별 구성에 따라 달라질 수 있습니다.</div>`;$("result").classList.remove("hidden");$("again").onclick=recommend;$("approve").onclick=approve;$("result").scrollIntoView({behavior:"smooth"})}function approve(){let h=read(HK,[]);h.unshift({d:new Date().toISOString(),store:current.s.name,menu:current.m.name,price:current.m.price,kcal:current.m.n.kcal});localStorage.setItem(HK,JSON.stringify(h.slice(0,5)));history()}function history(){let h=read(HK,[]);$("history").innerHTML=h.length?h.map(x=>`<article><strong>${x.store} · ${x.menu}</strong><br>${fmt(x.price)} · ${Math.round(x.kcal)}kcal<br><small class="muted">${new Date(x.d).toLocaleString("ko-KR")}</small></article>`).join(""):`<p class="muted">아직 결정한 메뉴가 없습니다.</p>`}
$("open").onclick=()=>{draft=structuredClone(pref);prefs();$("modal").classList.add("open")};$("close").onclick=()=>$("modal").classList.remove("open");$("reset").onclick=()=>{draft=DEF();prefs()};$("save").onclick=()=>{pref=structuredClone(draft);localStorage.setItem(PK,JSON.stringify(pref));summary();$("modal").classList.remove("open")};$("go").onclick=recommend;summary();stores();goals();target();history();
</script></body></html>
