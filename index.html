<!doctype html><html lang="ko"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>오늘의 샐러드</title><style>
:root{--g:#24753a;--gd:#154d28;--lg:#eaf6ed;--bg:#f4f7f5;--tx:#202624;--mu:#66716b;--ln:#dfe6e1;--red:#b42318}*{box-sizing:border-box}body{margin:0;background:var(--bg);color:var(--tx);font:17px/1.58 -apple-system,BlinkMacSystemFont,"Segoe UI","Noto Sans KR",sans-serif}.wrap{max-width:820px;margin:auto;padding:20px 16px 70px}.hero,.card{padding:23px;border-radius:23px;margin-bottom:15px}.hero{color:#fff;background:linear-gradient(135deg,var(--gd),var(--g))}.card{background:#fff;border:1px solid var(--ln);box-shadow:0 8px 24px #183f2710}h1,h2,h3,p{margin-top:0}h1{font-size:2.1rem;margin-bottom:6px}h2{font-size:1.4rem}.muted{color:var(--mu);font-size:.95rem}.grid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px}.row,.actions{display:flex;gap:9px;flex-wrap:wrap;align-items:center}.btn,input,select,textarea{font:inherit;border:1px solid var(--ln);border-radius:13px;padding:11px;background:#fff}.btn{font-weight:750;cursor:pointer}.primary{color:#fff;background:var(--g);border-color:var(--g)}.danger{color:#fff;background:var(--red);border-color:var(--red)}.wide{width:100%}.pick{min-height:60px}.active{background:var(--lg);border-color:var(--g);color:#145526}.field{margin:14px 0}.field label{display:block;margin-bottom:6px;font-weight:800}.field input,.field select,.field textarea{width:100%}.hidden{display:none!important}.badge{display:inline-block;padding:5px 10px;border-radius:99px;background:var(--lg);color:#145526;font-size:.85rem;font-weight:850}.order{border:1px solid var(--ln);border-radius:14px;overflow:hidden;margin:14px 0}.line{display:flex;justify-content:space-between;gap:12px;padding:12px 14px;border-bottom:1px solid var(--ln)}.line:last-child{border:0}.total{display:flex;justify-content:space-between;padding:15px;background:var(--gd);color:#fff;border-radius:14px;font-weight:900}.notice{padding:12px;border-radius:12px;background:#fff6dd;color:#704600;margin:12px 0}.room{background:#eef7ff;border-color:#bedaff}.person{padding:12px 0;border-bottom:1px solid var(--ln)}.menu-group{padding:14px;border:1px solid var(--ln);border-radius:14px;margin:10px 0}.tabs{display:flex;gap:8px;margin-bottom:12px}.tabs .btn{flex:1}.status{font-weight:800}.ok{color:#17642d}.bad{color:var(--red)}a{color:inherit}@media(min-width:680px){.stores{grid-template-columns:repeat(3,1fr)}}
</style></head><body><main class="wrap">
<section class="hero"><h1>오늘의 샐러드</h1><p>영양정보 기반 메뉴 추천과 단체 주문 참여</p><div class="actions"><a class="btn" href="order-admin.html">단체 주문방 관리</a></div></section>
<section id="setup" class="card notice hidden"><strong>Firebase 설정 필요</strong><br><code>firebase-config.js</code>의 설정값을 입력하세요.</section>
<section id="roomBox" class="card room hidden"><span class="badge">단체 주문방</span><h2 id="roomTitle"></h2><p id="roomMeta"></p><p id="roomNotice"></p><div class="field"><label>주문자 이름</label><input id="personName" maxlength="20" placeholder="이름을 입력하세요"></div></section>
<section class="card"><h2>1. 매장 선택</h2><div id="stores" class="grid stores"></div></section>
<section class="card"><h2>2. 식사 목적</h2><p id="target" class="muted"></p><div id="goals" class="grid"></div></section>
<button id="recommend" class="btn primary wide">메뉴 추천받기</button><section id="result" class="card hidden"></section>
</main><script type="module">
import{initializeApp}from'https://www.gstatic.com/firebasejs/12.1.0/firebase-app.js';import{getAuth,signInAnonymously}from'https://www.gstatic.com/firebasejs/12.1.0/firebase-auth.js';import{getDatabase,ref,get,set,onValue}from'https://www.gstatic.com/firebasejs/12.1.0/firebase-database.js';import{firebaseConfig}from'./firebase-config.js';import{STORES,TARGET}from'./menu-data.js';
const $=x=>document.getElementById(x),fmt=n=>n.toLocaleString('ko-KR')+'원';let auth,db,user,roomId=new URLSearchParams(location.search).get('room'),room=null,storeId='prep',goal='balanced',choice=null;
const configured=!firebaseConfig.apiKey.includes('PASTE_');if(!configured)$('setup').classList.remove('hidden');
async function startFirebase(){if(!configured)return;const app=initializeApp(firebaseConfig);auth=getAuth(app);db=getDatabase(app);user=(await signInAnonymously(auth)).user;if(roomId)loadRoom();}
async function loadRoom(){onValue(ref(db,`saladOrders/rooms/${roomId}/info`),s=>{room=s.val();if(!room){alert('존재하지 않는 주문방입니다.');return}$('roomBox').classList.remove('hidden');$('roomTitle').textContent=room.title;$('roomMeta').textContent=`매장: ${room.storeName} · 마감: ${new Date(room.deadline).toLocaleString('ko-KR')} · 상태: ${room.status}`;$('roomNotice').textContent=room.notice||'';storeId=room.storeId;renderStores();})}
function renderStores(){$('stores').innerHTML=STORES.map(s=>`<button class="btn pick ${storeId===s.id?'active':''}" data-id="${s.id}" ${room?'disabled':''}>${s.name}</button>`).join('');document.querySelectorAll('[data-id]').forEach(b=>b.onclick=()=>{storeId=b.dataset.id;renderStores()})}function renderGoals(){$('goals').innerHTML=Object.entries(TARGET).map(([k,v])=>`<button class="btn pick ${goal===k?'active':''}" data-g="${k}">${v.name}</button>`).join('');document.querySelectorAll('[data-g]').forEach(b=>b.onclick=()=>{goal=b.dataset.g;renderGoals();renderTarget()})}function renderTarget(){let t=TARGET[goal];$('target').textContent=t.min?`목표 ${t.min}~${t.max}kcal · 단백질 ${t.p}g 이상`:'칼로리 제한 없음'}
function recommend(){let s=STORES.find(x=>x.id===storeId),t=TARGET[goal],list=s.menus.map(m=>{let sc=(m.kcal>=t.min&&m.kcal<=t.max?40:-Math.min(35,(m.kcal<t.min?t.min-m.kcal:m.kcal-t.max)/8))+(m.protein>=t.p?25:-(t.p-m.protein)*1.5);return{s,m,sc}}).sort((a,b)=>b.sc-a.sc);choice=list[Math.random()<.8?0:Math.min(1,list.length-1)];show()}
function show(){let{s,m,sc}=choice;$('result').classList.remove('hidden');$('result').innerHTML=`<span class="badge">영양정보 기반 추천</span><h2>${s.name} · ${m.name}</h2><p>적합도 ${Math.round(sc)}점</p><div class="order"><div class="line"><span>가격</span><strong>${fmt(m.price)}</strong></div><div class="line"><span>열량</span><strong>${m.kcal} kcal</strong></div><div class="line"><span>단백질</span><strong>${m.protein} g</strong></div></div><div class="field"><label>요청사항</label><textarea id="request" maxlength="200" placeholder="예: 소스 적게"></textarea></div><div class="actions"><button id="again" class="btn">다시 추천</button>${roomId?'<button id="submitOrder" class="btn primary">주문방에 제출</button>':''}</div>`;$('again').onclick=recommend;if(roomId)$('submitOrder').onclick=submitOrder;}
async function submitOrder(){if(!configured)return alert('Firebase 설정이 필요합니다.');if(!room||room.status!=='open'||room.deadline<=Date.now())return alert('마감된 주문방입니다.');let name=$('personName').value.trim();if(!name)return alert('이름을 입력하세요.');let{s,m}=choice;await set(ref(db,`saladOrders/rooms/${roomId}/orders/${user.uid}`),{uid:user.uid,name,storeId:s.id,storeName:s.name,menuId:m.id,menuName:m.name,price:m.price,calories:m.kcal,protein:m.protein,request:$('request').value.trim(),status:'submitted',updatedAt:Date.now()});localStorage.setItem('salad.order.name',name);alert('주문이 제출되었습니다. 마감 전에는 다시 제출해 변경할 수 있습니다.');}
$('personName').value=localStorage.getItem('salad.order.name')||'';$('recommend').onclick=recommend;renderStores();renderGoals();renderTarget();startFirebase();
</script></body></html>
