<!doctype html><html lang="ko"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>마곡나루 점심 추천</title><style>
:root{--g:#24753a;--lg:#eaf6ed;--bg:#f5f7f6;--tx:#202624;--mu:#68726d;--ln:#dfe6e1}*{box-sizing:border-box}body{margin:0;background:var(--bg);color:var(--tx);font-size:17px;line-height:1.58;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Noto Sans KR",sans-serif}.wrap{max-width:760px;margin:auto;padding:18px 15px 50px}.hero,.card{border-radius:22px;padding:22px;margin-bottom:14px}.hero{color:#fff;background:linear-gradient(135deg,#164d28,var(--g))}.card{background:#fff;border:1px solid var(--ln);box-shadow:0 8px 24px #183f2710}h1,h2,p{margin-top:0}h1{margin-bottom:7px;font-size:2.15rem}h2{font-size:1.4rem}.muted{color:var(--mu);font-size:.96rem}.grid{display:grid;grid-template-columns:repeat(2,1fr);gap:9px}.chips,.actions{display:flex;gap:8px;flex-wrap:wrap}.pick,.chip,.btn{font-size:1rem;border:1px solid var(--ln);border-radius:13px;background:#fff;padding:11px;font-weight:750;cursor:pointer}.pick{min-height:58px}.pick.active,.chip.active{background:var(--lg);border-color:var(--g);color:#145526}.random{grid-column:1/-1}.btn.primary{color:#fff;background:var(--g);border-color:var(--g)}.btn.wide{width:100%;font-size:1.05rem;min-height:55px}.summary{display:grid;gap:7px}.summary div{display:grid;grid-template-columns:112px 1fr;gap:10px;font-size:.98rem}.summary strong{color:#145526}.result{border-color:#abd4b4}.badge{display:inline-block;padding:6px 10px;border-radius:99px;background:var(--lg);color:#145526;font-size:.84rem;font-weight:850}.order{margin:14px 0;border:1px solid var(--ln);border-radius:14px;overflow:hidden}.line{display:flex;justify-content:space-between;gap:12px;padding:13px;border-bottom:1px solid var(--ln)}.line:last-child{border:0}.total{display:flex;justify-content:space-between;padding:15px;border-radius:13px;color:#fff;background:#164d28;font-weight:900}.notice{margin-top:13px;padding:13px;border-radius:12px;background:#fff6dd;color:#704600;font-size:.92rem}.modalbg{display:none;position:fixed;inset:0;background:#0008;z-index:5;align-items:flex-end}.modalbg.open{display:flex}.modal{width:min(760px,100%);max-height:92vh;overflow:auto;margin:auto;background:#fff;padding:20px;border-radius:24px 24px 0 0}.field{margin:20px 0}.field>strong{display:block;margin-bottom:9px}.hidden{display:none}.savebar{position:sticky;bottom:0;padding:12px 0;background:#fff}.history article{padding:11px 0;border-bottom:1px solid var(--ln)}a{color:#17662d}@media(min-width:650px){.stores{grid-template-columns:repeat(3,1fr)}.modalbg{align-items:center;padding:20px}.modal{border-radius:24px}}
</style></head><body><main class="wrap"><section class="hero"><h1>오늘의 샐러드</h1><p>취향·식사 목적에 맞춰 매장과 메뉴를 추천합니다.</p><button class="btn" id="openPref">⚙ 취향 설정</button></section><section class="card"><h2>저장된 취향</h2><div id="summary"></div></section><section class="card"><h2>1. 매장 선택</h2><div class="grid stores" id="stores"></div></section><section class="card"><h2>2. 식사 목적</h2><div class="grid" id="purposes"></div></section><button class="btn primary wide" id="recommend">오늘의 메뉴 추천받기</button><section class="card result hidden" id="result"></section><section class="card"><h2>최근 결정</h2><div class="history" id="history"></div></section></main>
<div class="modalbg" id="modal"><div class="modal"><h2>내 취향 설정</h2><div class="field"><strong>좋아하는 단백질</strong><div class="chips" id="proteins"></div></div><div class="field"><strong>좋아하는 추가 재료</strong><div class="chips" id="extras"></div></div><div class="field"><strong>제외 재료</strong><div class="chips" id="excluded"></div></div><div class="field"><strong>써브웨이 선호 빵</strong><div class="grid" id="breads"></div></div><div class="field"><strong>매장별 개인 취향</strong><div class="chips" id="storePrefs"></div></div><div class="savebar actions"><button class="btn" id="closePref">닫기</button><button class="btn" id="resetPref">초기화</button><button class="btn primary" id="savePref">취향 저장</button></div></div></div>
<script>
const LABEL={chicken:"닭고기",pork:"돼지고기",beef:"소고기",salmon:"연어",tuna:"참치",shrimp:"새우",egg:"계란",tofu:"두부",avocado:"아보카도",pasta:"파스타면",buckwheat:"메밀면",grain:"곡물밥",mushroom:"버섯",sweetPotato:"고구마",pumpkin:"단호박",corn:"옥수수",cheese:"치즈",chickpea:"병아리콩",edamame:"에다마메",cucumber:"오이",carrot:"당근",broccoli:"브로콜리",potato:"감자",tortilla:"또띠아칩",seaweed:"해초",natto:"낫또",onion:"양파",tomato:"토마토",olive:"올리브",nuts:"견과류",mayo:"마요네즈",spicy:"매운 재료",diet:"다이어트",protein:"고단백",light:"가볍게",filling:"든든하게",balanced:"균형 있게",any:"아무거나",flatbread:"플랫브레드",white:"화이트",wheat:"위트",parmesan:"파마산 오레가노",honeyOat:"허니오트",avoidPrepPork:"프레퍼스 돼지고기 덜 추천",avoidPrepRice:"프레퍼스 밥 메뉴 덜 추천"};
const M=(id,name,price,ing,goals,sauce,priceDate,source)=>({id,name,price,ing,goals,sauce,priceDate,source});
const STORES=[
{id:"prep",name:"프레퍼스",branch:"마곡나루역점",menus:[M("prep-cp","치킨 샐러드 파스타",8900,["chicken","pasta"],["protein","balanced"],"발사믹 계열","2026-01-26","공식 메뉴명·2026 가격 자료"),M("prep-pp","포크 샐러드 파스타",8900,["pork","pasta"],["protein","filling"],"발사믹 계열","2026-01-26","2026 가격 자료"),M("prep-bp","비프 샐러드 파스타",13900,["beef","pasta"],["protein","filling"],"발사믹 계열","2026-06-10","마곡나루역점 방문 가격"),M("prep-cr","치킨 데리야끼 덮밥",9900,["chicken","grain"],["protein","filling"],"데리야끼","2026-01-26","2026 가격 자료")]},
{id:"salady",name:"샐러디",branch:"마곡나루역점",menus:[M("sal-r","로스트닭다리살 샐러디",12000,["chicken"],["diet","protein"],"추천 드레싱","2026-01","2026 프랜차이즈 가격"),M("sal-s","그라브락스 연어 샐러디",13700,["salmon"],["diet","protein"],"레몬 계열","2026-01","2026 프랜차이즈 가격"),M("sal-b","우삼겹메밀면 누들볼",10700,["beef","buckwheat","onion"],["filling","balanced"],"참깨 계열","2026-01","2026 프랜차이즈 가격"),M("sal-p","고소삼겹 들기름파스타 누들볼",10900,["pork","pasta"],["filling","balanced"],"들기름 계열","2026-01","2026 프랜차이즈 가격")]},
{id:"poke",name:"포케올데이",branch:"마곡나루역점",menus:[M("poke-t","곡물밥 스파이시 참치 포케",12900,["tuna","grain","spicy"],["protein","filling"],"유자 간장","2026-04-22","마곡나루역점 방문 가격"),M("poke-d","곡물밥 훈제오리 포케",11900,["grain"],["filling","balanced"],"비건 크리미언","2026-05-23","마곡나루역점 주문 가격")]},
{id:"slow",name:"슬로우캘리",branch:"마곡나루점",menus:[M("slow-s","클래식 연어 포케",12500,["salmon","grain","seaweed"],["protein","balanced","filling"],"클래식 간장","2026-04-29","2026 매장 가격 자료")]},
{id:"salyo",name:"샐요뜨",branch:"마곡권역 판매 여부 확인",menus:[M("sy-c","닭가슴살 샐러드",8900,["chicken","egg","tomato","olive","nuts"],["diet","protein"],"발사믹","2025-03-28","공개 메뉴 가격"),M("sy-sa","생연어 아보카도 샐러드",12900,["salmon","avocado","tomato","olive","nuts"],["diet","protein","balanced"],"발사믹","2025-03-28","공개 메뉴 가격"),M("sy-pc","닭가슴살 포케",9900,["chicken","grain","seaweed","onion"],["protein","filling"],"스위트칠리","2025-03-28","공개 메뉴 가격"),M("sy-ps","생연어 포케",12900,["salmon","grain","seaweed","onion"],["protein","filling"],"스위트칠리","2025-03-28","공개 메뉴 가격")]},
{id:"subway",name:"써브웨이",branch:"마곡나루역점",menus:[M("sub-e","에그마요 15cm",6200,["egg","mayo","onion","tomato","olive"],["filling"],"스위트 어니언","2026-06-24","2026 메뉴 가격"),M("sub-b","이탈리안 비엠티 15cm",7200,["pork","onion","tomato","olive"],["filling"],"머스타드","2026-01-22","2026 메뉴 가격"),M("sub-r","로티세리 바비큐 치킨 15cm",7800,["chicken","onion","tomato","olive"],["protein","balanced"],"레드와인 식초","2026-01-22","2026 메뉴 가격"),M("sub-sh","쉬림프 15cm",8200,["shrimp","onion","tomato","olive"],["light","balanced"],"스위트칠리","2026-06-24","2026 메뉴 가격"),M("sub-st","스테이크 & 치즈 15cm",8500,["beef","onion"],["protein","filling"],"치폴레","2026-01-22","2026 메뉴 가격")]}];
const PREF_KEY="salad.preferences",HISTORY_KEY="salad.history",LEGACY_PREF=["salad.pref.v3","saladApp.preferences.v2","saladApp.preferences.v1"],LEGACY_HIST=["salad.history.v3","saladApp.history.v1"];
const DEF=()=>({proteins:["chicken","salmon","egg"],extras:["avocado","pasta"],excluded:["seaweed","natto"],bread:"flatbread",storePrefs:["avoidPrepPork","avoidPrepRice"]});
function migrate(main,legacy,def){let x=localStorage.getItem(main);if(x)return JSON.parse(x);for(const k of legacy){x=localStorage.getItem(k);if(x){localStorage.setItem(main,x);return JSON.parse(x)}}return def}
let pref={...DEF(),...migrate(PREF_KEY,LEGACY_PREF,{})},draft=structuredClone(pref),selectedStore="random",goal="balanced",current=null;const $=x=>document.getElementById(x),fmt=n=>new Intl.NumberFormat("ko-KR").format(n)+"원",lab=a=>a.map(x=>LABEL[x]||x).join(" · ");
function renderSummary(){$("summary").innerHTML=`<div class="summary"><div><strong>단백질</strong><span>${lab(pref.proteins)}</span></div><div><strong>추가 재료</strong><span>${lab(pref.extras)}</span></div><div><strong>제외 재료</strong><span>${lab(pref.excluded)}</span></div><div><strong>써브웨이 빵</strong><span>${LABEL[pref.bread]}</span></div><div><strong>매장 취향</strong><span>${lab(pref.storePrefs)}</span></div></div>`}
function renderStores(){$("stores").innerHTML=`<button class="pick random ${selectedStore==="random"?"active":""}" data-s="random">🎲 전체 랜덤</button>`+STORES.map(s=>`<button class="pick ${selectedStore===s.id?"active":""}" data-s="${s.id}">${s.name}<br><small>${s.branch}</small></button>`).join("");document.querySelectorAll("[data-s]").forEach(b=>b.onclick=()=>{selectedStore=b.dataset.s;renderStores()})}function renderPurposes(){const a=["diet","protein","light","filling","balanced","any"];$('purposes').innerHTML=a.map(x=>`<button class="pick ${goal===x?"active":""}" data-g="${x}">${LABEL[x]}</button>`).join("");document.querySelectorAll("[data-g]").forEach(b=>b.onclick=()=>{goal=b.dataset.g;renderPurposes()})}
function chipGroup(id,arr,key){$(id).innerHTML=arr.map(x=>`<button class="chip ${draft[key].includes(x)?"active":""}" data-k="${key}" data-v="${x}">${LABEL[x]}</button>`).join("");$(id).querySelectorAll('button').forEach(b=>b.onclick=()=>{const {k,v}=b.dataset;draft[k]=draft[k].includes(v)?draft[k].filter(x=>x!==v):[...draft[k],v];if(k==="extras"&&draft.extras.includes(v))draft.excluded=draft.excluded.filter(x=>x!==v);if(k==="excluded"&&draft.excluded.includes(v))draft.extras=draft.extras.filter(x=>x!==v);renderPrefs()})}function renderPrefs(){chipGroup("proteins",["chicken","pork","beef","salmon","tuna","shrimp","egg","tofu"],"proteins");chipGroup("extras",["avocado","pasta","buckwheat","grain","mushroom","sweetPotato","pumpkin","corn","cheese","chickpea","edamame","cucumber","carrot","broccoli","potato","tortilla"],"extras");chipGroup("excluded",["seaweed","natto","onion","tomato","olive","nuts","mayo","spicy"],"excluded");chipGroup("storePrefs",["avoidPrepPork","avoidPrepRice"],"storePrefs");$("breads").innerHTML=["flatbread","white","wheat","parmesan","honeyOat"].map(x=>`<button class="pick ${draft.bread===x?"active":""}" data-b="${x}">${LABEL[x]}</button>`).join("");document.querySelectorAll("[data-b]").forEach(b=>b.onclick=()=>{draft.bread=b.dataset.b;renderPrefs()})}
function score(s,m){let n=m.ing.filter(x=>pref.proteins.includes(x)).length*5+m.ing.filter(x=>pref.extras.includes(x)).length*3+(m.goals.includes(goal)?7:0)+Math.random()*2;if(s.id==="prep"&&pref.storePrefs.includes("avoidPrepPork")&&m.ing.includes("pork"))n-=12;if(s.id==="prep"&&pref.storePrefs.includes("avoidPrepRice")&&m.ing.includes("grain"))n-=10;return n}
function recommend(){const stores=selectedStore==="random"?STORES:STORES.filter(s=>s.id===selectedStore),c=[];stores.forEach(s=>s.menus.filter(m=>!m.ing.some(x=>pref.excluded.includes(x))).forEach(m=>c.push({s,m,n:score(s,m)})));if(!c.length)return alert("제외 조건에 맞는 메뉴가 없습니다.");c.sort((a,b)=>b.n-a.n);const top=c.slice(0,Math.min(5,c.length));let p=top[Math.floor(Math.random()*top.length)];if(current&&top.length>1){const alt=top.filter(x=>x.m.id!==current.m.id);p=alt[Math.floor(Math.random()*alt.length)]}current=p;renderResult()}
function renderResult(){const {s,m}=current,bread=s.id==="subway"?pref.bread:null;$("result").innerHTML=`<span class="badge">가격 반영 완료</span><h2>${s.name} · ${m.name}</h2><p class="muted">${s.branch}</p><div class="order"><div class="line"><span>기본 메뉴</span><strong>${fmt(m.price)}</strong></div>${bread?`<div class="line"><span>선호 빵: ${LABEL[bread]}</span><strong>기본 포함</strong></div>`:""}<div class="line"><span>추천 소스: ${m.sauce}</span><strong>기본 포함</strong></div><div class="line"><span>추가 토핑</span><strong>추가 없음</strong></div></div><div class="total"><span>총 예상 금액</span><span>${fmt(m.price)}</span></div><div class="actions" style="margin-top:14px"><button class="btn primary" id="approve">이 메뉴로 결정</button><button class="btn" id="again">다시 추천</button></div><div class="notice">가격 기준: ${m.priceDate} · ${m.source}. 지점·주문 채널·프로모션에 따라 달라질 수 있습니다.</div>`;$("result").classList.remove("hidden");$("again").onclick=recommend;$("approve").onclick=approve;$("result").scrollIntoView({behavior:"smooth"})}
function approve(){const h=migrate(HISTORY_KEY,LEGACY_HIST,[]);h.unshift({d:new Date().toISOString(),store:current.s.name,menu:current.m.name,price:current.m.price});localStorage.setItem(HISTORY_KEY,JSON.stringify(h.slice(0,5)));renderHistory()}function renderHistory(){const h=migrate(HISTORY_KEY,LEGACY_HIST,[]);$("history").innerHTML=h.length?h.map(x=>`<article><strong>${x.store} · ${x.menu}</strong><br><span>${x.price?fmt(x.price):"가격 미저장"}</span><br><small class="muted">${new Date(x.d||x.date).toLocaleString("ko-KR")}</small></article>`).join(""):`<p class="muted">아직 결정한 메뉴가 없습니다.</p>`}
$("openPref").onclick=()=>{draft=structuredClone(pref);renderPrefs();$("modal").classList.add("open")};$("closePref").onclick=()=>$("modal").classList.remove("open");$("resetPref").onclick=()=>{draft=DEF();renderPrefs()};$("savePref").onclick=()=>{pref=structuredClone(draft);localStorage.setItem(PREF_KEY,JSON.stringify(pref));renderSummary();$("modal").classList.remove("open")};$("recommend").onclick=recommend;renderSummary();renderStores();renderPurposes();renderHistory();
</script></body></html>
