<!doctype html><html lang="ko"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>오늘의 샐러드</title><style>
:root{--p:#176b3a;--pd:#0e4b29;--ps:#eaf7ef;--bg:#f2f6f3;--tx:#17221c;--mu:#69766e;--ln:#dbe5de;--shadow:0 16px 42px #193f2812}*{box-sizing:border-box}body{margin:0;color:var(--tx);background:linear-gradient(180deg,#eaf4ee,#f7f9f8 360px);font:16px/1.55 -apple-system,BlinkMacSystemFont,"Segoe UI","Noto Sans KR",sans-serif}.wrap{width:min(100% - 24px,900px);margin:auto;padding:18px 0 70px}.hero,.card{border-radius:25px;margin-bottom:17px}.hero{padding:31px;color:#fff;background:linear-gradient(135deg,#0d4827,#18713d 62%,#2d8a50);box-shadow:0 20px 48px #104c2a35}.hero h1{margin:0 0 7px;font-size:clamp(2rem,6vw,2.6rem);letter-spacing:-.05em}.hero p{margin:0 0 19px;color:#ffffffe0}.card{padding:25px;background:#fffffff2;border:1px solid var(--ln);box-shadow:var(--shadow)}h2{margin:0 0 6px;font-size:1.4rem;letter-spacing:-.03em}.muted{margin:0 0 17px;color:var(--mu)}.actions,.chips{display:flex;gap:9px;flex-wrap:wrap}.grid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px}.btn,.pick,.chip,input,textarea{font:inherit;color:var(--tx);background:#fff;border:1px solid var(--ln);border-radius:14px;padding:11px}.btn,.pick,.chip{font-weight:800;cursor:pointer;text-decoration:none}.hero .btn{color:var(--pd);background:#fff}.primary{color:#fff!important;background:linear-gradient(135deg,var(--p),#23854a)!important;border-color:transparent!important}.wide{width:100%;min-height:55px}.pick{min-height:59px}.active{color:var(--pd);background:var(--ps);border-color:#54a272}.summary{display:grid;gap:8px}.summary div{display:grid;grid-template-columns:115px 1fr;gap:10px}.summary strong{color:var(--p)}.hidden{display:none!important}.room{background:linear-gradient(145deg,#f2fbf6,#edf7ff)}.notice{padding:12px;border-radius:13px;background:#fff7df;color:#734b00}.field{margin:15px 0}.field label,.field>strong{display:block;margin-bottom:7px;font-weight:850}.field input,.field textarea{width:100%}.badge{display:inline-flex;padding:6px 10px;border-radius:999px;color:var(--p);background:#ddf4e6;font-weight:900}.order{overflow:hidden;margin:14px 0;border:1px solid var(--ln);border-radius:15px}.line{display:flex;justify-content:space-between;padding:12px 14px;border-bottom:1px solid var(--ln)}.line:last-child{border:0}.result-title{margin:12px 0 4px}.modalbg{display:none;position:fixed;inset:0;z-index:20;background:#0008;align-items:flex-end}.modalbg.open{display:flex}.modal{width:min(100%,820px);max-height:92vh;overflow:auto;margin:auto;padding:23px;background:#fff;border-radius:25px 25px 0 0}.savebar{position:sticky;bottom:0;padding-top:13px;background:#fff}.history article{padding:12px 0;border-bottom:1px solid var(--ln)}@media(min-width:680px){.stores{grid-template-columns:repeat(3,1fr)}.random{grid-column:1/-1}.modalbg{align-items:center;padding:20px}.modal{border-radius:25px}}@media(max-width:560px){.card{padding:21px 18px}.hero{padding:27px 23px}.summary div{grid-template-columns:95px 1fr}}
</style></head><body><main class="wrap"><section class="hero"><h1>오늘의 샐러드</h1><p>영양정보와 개인 취향을 반영해 오늘 메뉴를 골라드려요.</p><div class="actions"><button id="openPref" class="btn">⚙ 취향 설정</button><a class="btn" href="order-admin.html">단체 주문방 관리</a></div></section><section id="errorBox" class="card notice hidden"></section><section id="roomBox" class="card room hidden"><span class="badge">단체 주문방</span><h2 id="roomTitle" style="margin-top:12px"></h2><p id="roomMeta" class="muted"></p><p id="roomNotice"></p><div class="field"><label>주문자 이름</label><input id="personName" maxlength="20" placeholder="이름 입력"></div></section><section class="card"><h2>저장된 취향</h2><p class="muted">추천에 반영되는 현재 설정입니다.</p><div id="summary"></div></section><section class="card"><h2>1. 매장 선택</h2><p class="muted">전체 매장 또는 특정 매장을 선택하세요.</p><div id="stores" class="grid stores"></div></section><section class="card"><h2>2. 식사 목적</h2><p id="target" class="muted"></p><div id="goals" class="grid"></div></section><button id="recommend" class="btn primary wide">영양정보로 메뉴 추천받기</button><section id="result" class="card hidden"></section><section class="card"><h2>최근 결정</h2><div id="history" class="history"></div></section></main><div id="modal" class="modalbg"><div class="modal"><h2>내 취향 설정</h2><div class="field"><strong>좋아하는 단백질</strong><div id="proteins" class="chips"></div></div><div class="field"><strong>좋아하는 추가 재료</strong><div id="extras" class="chips"></div></div><div class="field"><strong>제외 재료</strong><div id="excluded" class="chips"></div></div><div class="field"><strong>써브웨이 선호 빵</strong><div id="breads" class="grid"></div></div><div class="field"><strong>매장별 개인 취향</strong><div id="storePrefs" class="chips"></div></div><div class="savebar actions"><button id="closePref" class="btn">닫기</button><button id="resetPref" class="btn">초기화</button><button id="savePref" class="btn primary">취향 저장</button></div></div></div>
<script type="module">
const STORES=[{id:'prep',name:'프레퍼스',menus:[['pcp','치킨 샐러드 파스타',8900,411,43,['chicken','pasta']],['ppp','포크 샐러드 파스타',8900,437,44,['pork','pasta']],['pbp','비프 샐러드 파스타',13900,578,50,['beef','pasta']],['pdt','치킨 데리야끼 덮밥',9900,492,44,['chicken','grain']],['pcc','치킨 커리 덮밥',9900,591,44,['chicken','grain']],['ppc','포크 커리 덮밥',10900,622,45,['pork','grain']],['pbc','비프 커리 덮밥',13900,731,51,['beef','grain']]]},{id:'salady',name:'샐러디',menus:[['sr','로스트닭다리살 샐러디',12000,259,13.2,['chicken']],['ss','그라브락스 연어 샐러디',13700,247,21,['salmon']],['sb','우삼겹메밀면 누들볼',10700,407,18,['beef','buckwheat']],['sp','고소삼겹 들기름파스타 누들볼',10900,445,16,['pork','pasta']]]},{id:'poke',name:'포케올데이',menus:[['pt','곡물밥 스파이시 참치 포케',12900,623,33.5,['tuna','grain','spicy']],['pd','곡물밥 훈제오리 포케',11900,732,25.2,['grain']]]},{id:'slow',name:'슬로우캘리',menus:[['sl','클래식 연어 포케',12500,569,30,['salmon','grain','seaweed']]]},{id:'subway',name:'써브웨이',menus:[['se','에그마요 15cm',6200,453,16.9,['egg','mayo','onion','tomato','olive']],['src','로티세리 바비큐 치킨 15cm',7800,328,29.1,['chicken','onion','tomato','olive']],['ssh','쉬림프 15cm',8200,281,16.3,['shrimp','onion','tomato','olive']],['sst','스테이크 & 치즈 15cm',8500,452,28.5,['beef','onion']]]}].map(s=>({...s,menus:s.menus.map(x=>({id:x[0],name:x[1],price:x[2],kcal:x[3],protein:x[4],ing:x[5]}))}));
const TARGET={diet:{name:'다이어트',min:250,max:450,p:18},protein:{name:'고단백',min:300,max:700,p:30},light:{name:'가볍게',min:200,max:400,p:12},filling:{name:'든든하게',min:500,max:800,p:25},balanced:{name:'균형 있게',min:350,max:650,p:20},any:{name:'아무거나',min:0,max:9999,p:0}},L={chicken:'닭고기',pork:'돼지고기',beef:'소고기',salmon:'연어',tuna:'참치',shrimp:'새우',egg:'계란',tofu:'두부',avocado:'아보카도',pasta:'파스타면',buckwheat:'메밀면',grain:'곡물밥',mushroom:'버섯',sweetPotato:'고구마',pumpkin:'단호박',corn:'옥수수',cheese:'치즈',chickpea:'병아리콩',edamame:'에다마메',cucumber:'오이',carrot:'당근',broccoli:'브로콜리',potato:'감자',tortilla:'또띠아칩',seaweed:'해초',natto:'낫또',onion:'양파',tomato:'토마토',olive:'올리브',nuts:'견과류',mayo:'마요네즈',spicy:'매운 재료',flatbread:'플랫브레드',white:'화이트',wheat:'위트',parmesan:'파마산 오레가노',honeyOat:'허니오트',avoidPrepPork:'프레퍼스 돼지고기 덜 추천',avoidPrepRice:'프레퍼스 밥 메뉴 덜 추천'};
const $=x=>document.getElementById(x),fmt=n=>n.toLocaleString('ko-KR')+'원',labs=a=>a.map(x=>L[x]||x).join(' · '),PK='salad.preferences',HK='salad.history',DEF=()=>({proteins:['chicken','salmon','egg'],extras:['avocado','pasta'],excluded:['seaweed','natto'],bread:'flatbread',storePrefs:['avoidPrepPork','avoidPrepRice']}),read=(k,d)=>{try{return JSON.parse(localStorage.getItem(k))??d}catch{return d}};let pref={...DEF(),...read(PK,{})},draft=structuredClone(pref),storeId='random',goal='balanced',choice=null,db,user,roomId=new URLSearchParams(location.search).get('room'),room=null,setDb,refDb;
function summary(){$('summary').innerHTML=`<div class="summary"><div><strong>단백질</strong><span>${labs(pref.proteins)}</span></div><div><strong>추가 재료</strong><span>${labs(pref.extras)}</span></div><div><strong>제외 재료</strong><span>${labs(pref.excluded)}</span></div><div><strong>써브웨이 빵</strong><span>${L[pref.bread]}</span></div><div><strong>매장 취향</strong><span>${labs(pref.storePrefs)}</span></div></div>`}function chips(id,a,k){$(id).innerHTML=a.map(x=>`<button class="chip ${draft[k].includes(x)?'active':''}" data-k="${k}" data-v="${x}">${L[x]}</button>`).join('');$(id).querySelectorAll('button').forEach(b=>b.onclick=()=>{let{k,v}=b.dataset;draft[k]=draft[k].includes(v)?draft[k].filter(x=>x!==v):[...draft[k],v];if(k==='extras')draft.excluded=draft.excluded.filter(x=>x!==v);if(k==='excluded')draft.extras=draft.extras.filter(x=>x!==v);prefs()})}function prefs(){chips('proteins',['chicken','pork','beef','salmon','tuna','shrimp','egg','tofu'],'proteins');chips('extras',['avocado','pasta','buckwheat','grain','mushroom','sweetPotato','pumpkin','corn','cheese','chickpea','edamame','cucumber','carrot','broccoli','potato','tortilla'],'extras');chips('excluded',['seaweed','natto','onion','tomato','olive','nuts','mayo','spicy'],'excluded');chips('storePrefs',['avoidPrepPork','avoidPrepRice'],'storePrefs');$('breads').innerHTML=['flatbread','white','wheat','parmesan','honeyOat'].map(x=>`<button class="pick ${draft.bread===x?'active':''}" data-b="${x}">${L[x]}</button>`).join('');document.querySelectorAll('[data-b]').forEach(b=>b.onclick=()=>{draft.bread=b.dataset.b;prefs()})}
function stores(){$('stores').innerHTML=(room?'':`<button class="pick random ${storeId==='random'?'active':''}" data-s="random">🎲 전체 매장에서 랜덤 추천</button>`)+STORES.map(s=>`<button class="pick ${storeId===s.id?'active':''}" data-s="${s.id}" ${room?'disabled':''}>${s.name}</button>`).join('');document.querySelectorAll('[data-s]').forEach(b=>b.onclick=()=>{storeId=b.dataset.s;stores()})}function goals(){$('goals').innerHTML=Object.entries(TARGET).map(([k,v])=>`<button class="pick ${goal===k?'active':''}" data-g="${k}">${v.name}</button>`).join('');document.querySelectorAll('[data-g]').forEach(b=>b.onclick=()=>{goal=b.dataset.g;goals();target()})}function target(){let t=TARGET[goal];$('target').textContent=t.min?`목표 ${t.min}~${t.max}kcal · 단백질 ${t.p}g 이상`:'칼로리 제한 없이 취향을 우선합니다.'}function score(s,m){let t=TARGET[goal],v=m.kcal>=t.min&&m.kcal<=t.max?40:-Math.min(35,(m.kcal<t.min?t.min-m.kcal:m.kcal-t.max)/8);v+=m.protein>=t.p?25:-(t.p-m.protein)*1.5;v+=m.ing.filter(x=>pref.proteins.includes(x)).length*6+m.ing.filter(x=>pref.extras.includes(x)).length*3;if(s.id==='prep'&&pref.storePrefs.includes('avoidPrepPork')&&m.ing.includes('pork'))v-=15;if(s.id==='prep'&&pref.storePrefs.includes('avoidPrepRice')&&m.ing.includes('grain'))v-=12;return v}function recommend(){let selected=storeId==='random'?STORES:STORES.filter(x=>x.id===storeId),list=selected.flatMap(s=>s.menus.filter(m=>!m.ing.some(x=>pref.excluded.includes(x))).map(m=>({s,m,sc:score(s,m)}))).sort((a,b)=>b.sc-a.sc);if(!list.length)return alert('조건에 맞는 메뉴가 없습니다.');choice=list[Math.random()<.8?0:Math.min(1,list.length-1)];show()}function show(){let{s,m,sc}=choice;$('result').classList.remove('hidden');$('result').innerHTML=`<span class="badge">영양정보·취향 기반 추천</span><h2 class="result-title">${s.name} · ${m.name}</h2><p class="muted">적합도 ${Math.round(sc)}점</p><div class="order"><div class="line"><span>가격</span><strong>${fmt(m.price)}</strong></div><div class="line"><span>열량</span><strong>${m.kcal} kcal</strong></div><div class="line"><span>단백질</span><strong>${m.protein} g</strong></div>${s.id==='subway'?`<div class="line"><span>선호 빵</span><strong>${L[pref.bread]}</strong></div>`:''}</div><div class="field"><label>요청사항</label><textarea id="request" maxlength="200" placeholder="예: 소스 적게"></textarea></div><div class="actions"><button id="again" class="btn">다시 추천</button><button id="decide" class="btn primary">이 메뉴로 결정</button>${roomId?'<button id="submitOrder" class="btn primary">주문방에 제출</button>':''}</div>`;$('again').onclick=recommend;$('decide').onclick=decide;if(roomId)$('submitOrder').onclick=submitOrder}function decide(){let h=read(HK,[]),m=choice.m;h.unshift({d:new Date().toISOString(),store:choice.s.name,menu:m.name,price:m.price,kcal:m.kcal});localStorage.setItem(HK,JSON.stringify(h.slice(0,5)));history()}function history(){let h=read(HK,[]);$('history').innerHTML=h.length?h.map(x=>`<article><strong>${x.store} · ${x.menu}</strong><br>${fmt(x.price)} · ${x.kcal}kcal<br><small class="muted">${new Date(x.d).toLocaleString('ko-KR')}</small></article>`).join(''):'<p class="muted">아직 결정한 메뉴가 없습니다.</p>'}
async function firebase(){if(!roomId)return;try{const [{firebaseConfig},{initializeApp},{getAuth,signInAnonymously},{getDatabase,ref,set,onValue}]=await Promise.all([import('./firebase-config.js'),import('https://www.gstatic.com/firebasejs/12.1.0/firebase-app.js'),import('https://www.gstatic.com/firebasejs/12.1.0/firebase-auth.js'),import('https://www.gstatic.com/firebasejs/12.1.0/firebase-database.js')]);let app=initializeApp(firebaseConfig);db=getDatabase(app);user=(await signInAnonymously(getAuth(app))).user;setDb=set;refDb=ref;onValue(ref(db,`saladOrders/rooms/${roomId}/info`),s=>{room=s.val();if(!room)throw new Error('존재하지 않는 주문방입니다.');$('roomBox').classList.remove('hidden');$('roomTitle').textContent=room.title;$('roomMeta').textContent=`매장: ${room.storeName} · 상태: ${room.status}`;$('roomNotice').textContent=room.notice||'';storeId=room.storeId;stores()})}catch(e){$('errorBox').classList.remove('hidden');$('errorBox').innerHTML=`<strong>주문방 연결 오류</strong><br>${e.code||e.message}`}}async function submitOrder(){try{if(!room||room.status!=='open')return alert('마감된 주문방입니다.');let name=$('personName').value.trim();if(!name)return alert('이름을 입력하세요.');let{s,m}=choice;await setDb(refDb(db,`saladOrders/rooms/${roomId}/orders/${user.uid}`),{uid:user.uid,name,storeId:s.id,storeName:s.name,menuId:m.id,menuName:m.name,price:m.price,calories:m.kcal,protein:m.protein,request:$('request').value.trim(),status:'submitted',updatedAt:Date.now()});localStorage.setItem('salad.order.name',name);alert('주문이 제출되었습니다.')}catch(e){alert(`주문 제출 실패: ${e.code||e.message}`)}}
$('personName').value=localStorage.getItem('salad.order.name')||'';$('openPref').onclick=()=>{draft=structuredClone(pref);prefs();$('modal').classList.add('open')};$('closePref').onclick=()=>$('modal').classList.remove('open');$('resetPref').onclick=()=>{draft=DEF();prefs()};$('savePref').onclick=()=>{pref=structuredClone(draft);localStorage.setItem(PK,JSON.stringify(pref));summary();$('modal').classList.remove('open')};$('recommend').onclick=recommend;summary();stores();goals();target();history();firebase();
</script></body></html>
