<!doctype html><html lang="ko"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>오늘의 샐러드</title><style>
:root{--g:#24753a;--gd:#154d28;--lg:#eaf6ed;--bg:#f4f7f5;--tx:#202624;--mu:#66716b;--ln:#dfe6e1}*{box-sizing:border-box}body{margin:0;background:var(--bg);color:var(--tx);font:17px/1.58 -apple-system,BlinkMacSystemFont,"Segoe UI","Noto Sans KR",sans-serif}.wrap{max-width:820px;margin:auto;padding:20px 16px 70px}.hero,.card{padding:23px;border-radius:23px;margin-bottom:15px}.hero{color:#fff;background:linear-gradient(135deg,var(--gd),var(--g))}.card{background:#fff;border:1px solid var(--ln);box-shadow:0 8px 24px #183f2710}h1,h2,p{margin-top:0}h1{font-size:2.15rem;margin-bottom:6px}h2{font-size:1.4rem}.muted{color:var(--mu)}.grid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px}.actions,.chips{display:flex;gap:9px;flex-wrap:wrap}.btn,.pick,.chip,input,textarea{font:inherit;color:var(--tx);border:1px solid var(--ln);border-radius:13px;padding:11px;background:#fff}.btn,.pick,.chip{font-weight:750;cursor:pointer;text-decoration:none}.hero .btn{color:var(--tx)!important}.primary{color:#fff!important;background:var(--g)!important;border-color:var(--g)!important}.wide{width:100%;min-height:58px}.pick{min-height:60px}.active{background:var(--lg);border-color:var(--g);color:#145526}.field{margin:15px 0}.field>label,.field>strong{display:block;margin-bottom:7px;font-weight:800}.field input,.field textarea{width:100%}.hidden{display:none!important}.summary{display:grid;gap:8px}.summary div{display:grid;grid-template-columns:115px 1fr;gap:10px}.summary strong{color:#145526}.badge{display:inline-block;padding:5px 10px;border-radius:99px;background:var(--lg);color:#145526;font-weight:850}.order{border:1px solid var(--ln);border-radius:14px;overflow:hidden;margin:14px 0}.line{display:flex;justify-content:space-between;padding:12px 14px;border-bottom:1px solid var(--ln)}.line:last-child{border:0}.room{background:#eef7ff}.notice{padding:12px;border-radius:12px;background:#fff6dd;color:#704600}.modalbg{display:none;position:fixed;inset:0;z-index:20;background:#0008;align-items:flex-end}.modalbg.open{display:flex}.modal{width:min(820px,100%);max-height:92vh;overflow:auto;margin:auto;padding:22px;background:#fff;border-radius:25px 25px 0 0}.savebar{position:sticky;bottom:0;background:#fff;padding:12px 0}.history article{padding:12px 0;border-bottom:1px solid var(--ln)}@media(min-width:680px){.stores{grid-template-columns:repeat(3,1fr)}.modalbg{align-items:center;padding:20px}.modal{border-radius:25px}}
</style></head><body><main class="wrap"><section class="hero"><h1>오늘의 샐러드</h1><p>영양정보와 개인 취향을 반영한 추천</p><div class="actions"><button id="openPref" class="btn">⚙ 취향 설정</button><a class="btn" href="order-admin.html">단체 주문방 관리</a></div></section><section id="setup" class="card notice hidden">Firebase 설정 전입니다. 일반 추천은 사용할 수 있습니다.</section><section id="roomBox" class="card room hidden"><span class="badge">단체 주문방</span><h2 id="roomTitle"></h2><p id="roomMeta"></p><p id="roomNotice"></p><div class="field"><label>주문자 이름</label><input id="personName" maxlength="20"></div></section><section class="card"><h2>저장된 취향</h2><div id="summary"></div></section><section class="card"><h2>1. 매장 선택</h2><div id="stores" class="grid stores"></div></section><section class="card"><h2>2. 식사 목적</h2><p id="target" class="muted"></p><div id="goals" class="grid"></div></section><button id="recommend" class="btn primary wide">영양정보로 메뉴 추천받기</button><section id="result" class="card hidden"></section><section class="card"><h2>최근 결정</h2><div id="history" class="history"></div></section></main>
<div id="modal" class="modalbg"><div class="modal"><h2>내 취향 설정</h2><div class="field"><strong>좋아하는 단백질</strong><div id="proteins" class="chips"></div></div><div class="field"><strong>좋아하는 추가 재료</strong><div id="extras" class="chips"></div></div><div class="field"><strong>제외 재료</strong><div id="excluded" class="chips"></div></div><div class="field"><strong>써브웨이 선호 빵</strong><div id="breads" class="grid"></div></div><div class="field"><strong>매장별 개인 취향</strong><div id="storePrefs" class="chips"></div></div><div class="savebar actions"><button id="closePref" class="btn">닫기</button><button id="resetPref" class="btn">초기화</button><button id="savePref" class="btn primary">취향 저장</button></div></div></div>
<script type="module">import{initializeApp}from'https://www.gstatic.com/firebasejs/12.1.0/firebase-app.js';import{getAuth,signInAnonymously}from'https://www.gstatic.com/firebasejs/12.1.0/firebase-auth.js';import{getDatabase,ref,set,onValue}from'https://www.gstatic.com/firebasejs/12.1.0/firebase-database.js';import{firebaseConfig}from'./firebase-config.js';import{STORES,TARGET}from'./menu-data.js';
const L={chicken:'닭고기',pork:'돼지고기',beef:'소고기',salmon:'연어',tuna:'참치',shrimp:'새우',egg:'계란',tofu:'두부',avocado:'아보카도',pasta:'파스타면',buckwheat:'메밀면',grain:'곡물밥',mushroom:'버섯',sweetPotato:'고구마',pumpkin:'단호박',corn:'옥수수',cheese:'치즈',chickpea:'병아리콩',edamame:'에다마메',cucumber:'오이',carrot:'당근',broccoli:'브로콜리',potato:'감자',tortilla:'또띠아칩',seaweed:'해초',natto:'낫또',onion:'양파',tomato:'토마토',olive:'올리브',nuts:'견과류',mayo:'마요네즈',spicy:'매운 재료',flatbread:'플랫브레드',white:'화이트',wheat:'위트',parmesan:'파마산 오레가노',honeyOat:'허니오트',avoidPrepPork:'프레퍼스 돼지고기 덜 추천',avoidPrepRice:'프레퍼스 밥 메뉴 덜 추천'},$=x=>document.getElementById(x),fmt=n=>n.toLocaleString('ko-KR')+'원',labs=a=>a.map(x=>L[x]||x).join(' · '),PK='salad.preferences',HK='salad.history',DEF=()=>({proteins:['chicken','salmon','egg'],extras:['avocado','pasta'],excluded:['seaweed','natto'],bread:'flatbread',storePrefs:['avoidPrepPork','avoidPrepRice']}),read=(k,d)=>{try{return JSON.parse(localStorage.getItem(k))??d}catch{return d}};let pref={...DEF(),...read(PK,{})},draft=structuredClone(pref),storeId='prep',goal='balanced',choice=null,db,user,roomId=new URLSearchParams(location.search).get('room'),room=null,configured=!firebaseConfig.apiKey.includes('PASTE_');if(!configured)$('setup').classList.remove('hidden');
function summary(){$('summary').innerHTML=`<div class="summary"><div><strong>단백질</strong><span>${labs(pref.proteins)}</span></div><div><strong>추가 재료</strong><span>${labs(pref.extras)}</span></div><div><strong>제외 재료</strong><span>${labs(pref.excluded)}</span></div><div><strong>써브웨이 빵</strong><span>${L[pref.bread]}</span></div><div><strong>매장 취향</strong><span>${labs(pref.storePrefs)}</span></div></div>`}function chips(id,a,k){$(id).innerHTML=a.map(x=>`<button class="chip ${draft[k].includes(x)?'active':''}" data-k="${k}" data-v="${x}">${L[x]}</button>`).join('');$(id).querySelectorAll('button').forEach(b=>b.onclick=()=>{let{k,v}=b.dataset;draft[k]=draft[k].includes(v)?draft[k].filter(x=>x!==v):[...draft[k],v];if(k==='extras')draft.excluded=draft.excluded.filter(x=>x!==v);if(k==='excluded')draft.extras=draft.extras.filter(x=>x!==v);prefs()})}function prefs(){chips('proteins',['chicken','pork','beef','salmon','tuna','shrimp','egg','tofu'],'proteins');chips('extras',['avocado','pasta','buckwheat','grain','mushroom','sweetPotato','pumpkin','corn','cheese','chickpea','edamame','cucumber','carrot','broccoli','potato','tortilla'],'extras');chips('excluded',['seaweed','natto','onion','tomato','olive','nuts','mayo','spicy'],'excluded');chips('storePrefs',['avoidPrepPork','avoidPrepRice'],'storePrefs');$('breads').innerHTML=['flatbread','white','wheat','parmesan','honeyOat'].map(x=>`<button class="pick ${draft.bread===x?'active':''}" data-b="${x}">${L[x]}</button>`).join('');document.querySelectorAll('[data-b]').forEach(b=>b.onclick=()=>{draft.bread=b.dataset.b;prefs()})}
function stores(){$('stores').innerHTML=(room?'':`<button class="pick ${storeId==='random'?'active':''}" data-s="random">🎲 전체 매장에서 랜덤 추천</button>`)+STORES.map(s=>`<button class="pick ${storeId===s.id?'active':''}" data-s="${s.id}" ${room?'disabled':''}>${s.name}</button>`).join('');document.querySelectorAll('[data-s]').forEach(b=>b.onclick=()=>{storeId=b.dataset.s;stores()})}function goals(){$('goals').innerHTML=Object.entries(TARGET).map(([k,v])=>`<button class="pick ${goal===k?'active':''}" data-g="${k}">${v.name}</button>`).join('');document.querySelectorAll('[data-g]').forEach(b=>b.onclick=()=>{goal=b.dataset.g;goals();target()})}function target(){let t=TARGET[goal];$('target').textContent=t.min?`목표 ${t.min}~${t.max}kcal · 단백질 ${t.p}g 이상`:'칼로리 제한 없음'}function score(s,m){let t=TARGET[goal],v=m.kcal>=t.min&&m.kcal<=t.max?40:-Math.min(35,(m.kcal<t.min?t.min-m.kcal:m.kcal-t.max)/8);v+=m.protein>=t.p?25:-(t.p-m.protein)*1.5;v+=m.ing.filter(x=>pref.proteins.includes(x)).length*6+m.ing.filter(x=>pref.extras.includes(x)).length*3;if(s.id==='prep'&&pref.storePrefs.includes('avoidPrepPork')&&m.ing.includes('pork'))v-=15;if(s.id==='prep'&&pref.storePrefs.includes('avoidPrepRice')&&m.ing.includes('grain'))v-=12;return v}function recommend(){let selected=storeId==='random'?STORES:STORES.filter(x=>x.id===storeId),list=selected.flatMap(s=>s.menus.filter(m=>!m.ing.some(x=>pref.excluded.includes(x))).map(m=>({s,m,sc:score(s,m)}))).sort((a,b)=>b.sc-a.sc);if(!list.length)return alert('조건에 맞는 메뉴가 없습니다.');choice=list[Math.random()<.8?0:Math.min(1,list.length-1)];show()}function show(){let{s,m,sc}=choice;$('result').classList.remove('hidden');$('result').innerHTML=`<span class="badge">영양정보·취향 기반 추천</span><h2>${s.name} · ${m.name}</h2><p>적합도 ${Math.round(sc)}점</p><div class="order"><div class="line"><span>가격</span><strong>${fmt(m.price)}</strong></div><div class="line"><span>열량</span><strong>${m.kcal} kcal</strong></div><div class="line"><span>단백질</span><strong>${m.protein} g</strong></div>${s.id==='subway'?`<div class="line"><span>선호 빵</span><strong>${L[pref.bread]}</strong></div>`:''}</div><div class="field"><label>요청사항</label><textarea id="request" maxlength="200"></textarea></div><div class="actions"><button id="again" class="btn">다시 추천</button><button id="decide" class="btn primary">이 메뉴로 결정</button>${roomId?'<button id="submitOrder" class="btn primary">주문방에 제출</button>':''}</div>`;$('again').onclick=recommend;$('decide').onclick=decide;if(roomId)$('submitOrder').onclick=submitOrder}function decide(){let h=read(HK,[]),m=choice.m;h.unshift({d:new Date().toISOString(),store:choice.s.name,menu:m.name,price:m.price,kcal:m.kcal});localStorage.setItem(HK,JSON.stringify(h.slice(0,5)));history()}function history(){let h=read(HK,[]);$('history').innerHTML=h.length?h.map(x=>`<article><strong>${x.store} · ${x.menu}</strong><br>${fmt(x.price)} · ${x.kcal}kcal<br><small class="muted">${new Date(x.d).toLocaleString('ko-KR')}</small></article>`).join(''):'<p class="muted">아직 결정한 메뉴가 없습니다.</p>'}
async function firebase(){if(!configured)return;let app=initializeApp(firebaseConfig);db=getDatabase(app);user=(await signInAnonymously(getAuth(app))).user;if(roomId)onValue(ref(db,`saladOrders/rooms/${roomId}/info`),s=>{room=s.val();if(!room)return alert('없는 주문방입니다.');$('roomBox').classList.remove('hidden');$('roomTitle').textContent=room.title;$('roomMeta').textContent=`매장: ${room.storeName} · 상태: ${room.status}`;$('roomNotice').textContent=room.notice||'';storeId=room.storeId;stores()})}async function submitOrder(){if(!room||room.status!=='open')return alert('마감된 주문방입니다.');let name=$('personName').value.trim();if(!name)return alert('이름을 입력하세요.');let{s,m}=choice;await set(ref(db,`saladOrders/rooms/${roomId}/orders/${user.uid}`),{uid:user.uid,name,storeId:s.id,storeName:s.name,menuId:m.id,menuName:m.name,price:m.price,calories:m.kcal,protein:m.protein,request:$('request').value.trim(),status:'submitted',updatedAt:Date.now()});localStorage.setItem('salad.order.name',name);alert('주문이 제출되었습니다.')}
$('personName').value=localStorage.getItem('salad.order.name')||'';$('openPref').onclick=()=>{draft=structuredClone(pref);prefs();$('modal').classList.add('open')};$('closePref').onclick=()=>$('modal').classList.remove('open');$('resetPref').onclick=()=>{draft=DEF();prefs()};$('savePref').onclick=()=>{pref=structuredClone(draft);localStorage.setItem(PK,JSON.stringify(pref));summary();$('modal').classList.remove('open')};$('recommend').onclick=recommend;summary();stores();goals();target();history();firebase();</script></body></html>
