<!doctype html><html lang="ko"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><meta name="theme-color" content="#1f6f38"><title>오늘의 샐러드</title><style>
:root{--g:#24753a;--gd:#164d28;--lg:#eaf6ed;--bg:#f5f7f6;--tx:#202624;--mu:#66716b;--ln:#dfe6e1}*{box-sizing:border-box}body{margin:0;background:var(--bg);color:var(--tx);font:17px/1.58 -apple-system,BlinkMacSystemFont,"Segoe UI","Noto Sans KR",sans-serif}.wrap{max-width:780px;margin:auto;padding:20px 16px 60px}.hero,.card{padding:23px;border-radius:23px;margin-bottom:15px}.hero{color:#fff;background:linear-gradient(135deg,var(--gd),var(--g));box-shadow:0 12px 30px #183f2730}.card{background:#fff;border:1px solid var(--ln);box-shadow:0 8px 24px #183f2710}h1,h2,p{margin-top:0}h1{font-size:2.2rem;margin-bottom:7px}h2{font-size:1.4rem;margin-bottom:7px}.muted{color:var(--mu);font-size:.96rem}.grid{display:grid;grid-template-columns:repeat(2,1fr);gap:9px}.stores{margin-top:14px}.chips,.actions{display:flex;gap:9px;flex-wrap:wrap}.pick,.chip,.btn{font:inherit;font-weight:750;border:1px solid var(--ln);border-radius:14px;background:#fff;padding:11px;cursor:pointer}.pick{min-height:60px}.pick.active,.chip.active{color:#145526;background:var(--lg);border-color:var(--g)}.random{grid-column:1/-1}.btn.primary{color:#fff;background:var(--g);border-color:var(--g)}.btn.wide{width:100%;min-height:58px;font-size:1.05rem}.summary{display:grid;gap:8px}.summary div{display:grid;grid-template-columns:115px 1fr;gap:10px;font-size:.98rem}.summary strong{color:#145526}.hidden{display:none}.badge{display:inline-block;padding:6px 10px;border-radius:99px;background:var(--lg);color:#145526;font-size:.84rem;font-weight:850}.order{margin:14px 0;border:1px solid var(--ln);border-radius:15px;overflow:hidden}.line{display:flex;justify-content:space-between;gap:12px;padding:13px 14px;border-bottom:1px solid var(--ln)}.line:last-child{border:0}.total{display:flex;justify-content:space-between;padding:16px;border-radius:14px;color:#fff;background:var(--gd);font-weight:900}.notice{margin-top:13px;padding:13px;border-radius:13px;background:#fff6dd;color:#704600;font-size:.92rem}.good{color:#17642d}.warn{color:#915700}.modalbg{display:none;position:fixed;inset:0;z-index:5;background:#0008;align-items:flex-end}.modalbg.open{display:flex}.modal{width:min(780px,100%);max-height:92vh;overflow:auto;margin:auto;padding:22px;background:#fff;border-radius:25px 25px 0 0}.field{margin:21px 0}.field>strong{display:block;margin-bottom:10px}.savebar{position:sticky;bottom:0;padding:13px 0;background:#fff}.history article{padding:12px 0;border-bottom:1px solid var(--ln)}@media(min-width:650px){.stores{grid-template-columns:repeat(3,1fr)}.modalbg{align-items:center;padding:20px}.modal{border-radius:25px}}
</style></head><body><main class="wrap"><section class="hero"><h1>오늘의 샐러드</h1><p>식사 목적별 열량과 단백질 기준을 먼저 적용한 뒤 취향에 맞는 메뉴를 추천합니다.</p><button class="btn" id="openPref">⚙ 취향 설정</button></section><section class="card"><h2>저장된 취향</h2><div id="summary"></div></section><section class="card"><h2>1. 매장 선택</h2><p class="muted">전체 추천 또는 특정 매장을 선택하세요.</p><div class="grid stores" id="stores"></div></section><section class="card"><h2>2. 식사 목적</h2><p class="muted" id="targetText"></p><div class="grid" id="purposes"></div></section><button class="btn primary wide" id="recommend">영양정보로 메뉴 추천받기</button><section class="card hidden" id="result"></section><section class="card"><h2>최근 결정</h2><div class="history" id="history"></div></section></main>
<div class="modalbg" id="modal"><div class="modal"><h2>내 취향 설정</h2><div class="field"><strong>좋아하는 단백질</strong><div class="chips" id="proteins"></div></div><div class="field"><strong>좋아하는 추가 재료</strong><div class="chips" id="extras"></div></div><div class="field"><strong>제외 재료</strong><div class="chips" id="excluded"></div></div><div class="field"><strong>써브웨이 선호 빵</strong><div class="grid" id="breads"></div></div><div class="field"><strong>매장별 개인 취향</strong><div class="chips" id="storePrefs"></div></div><div class="savebar actions"><button class="btn" id="closePref">닫기</button><button class="btn" id="resetPref">초기화</button><button class="btn primary" id="savePref">취향 저장</button></div></div></div>
<script>
const L={chicken:"닭고기",pork:"돼지고기",beef:"소고기",salmon:"연어",tuna:"참치",shrimp:"새우",egg:"계란",tofu:"두부",avocado:"아보카도",pasta:"파스타면",buckwheat:"메밀면",grain:"곡물밥",mushroom:"버섯",sweetPotato:"고구마",pumpkin:"단호박",corn:"옥수수",cheese:"치즈",chickpea:"병아리콩",edamame:"에다마메",cucumber:"오이",carrot:"당근",broccoli:"브로콜리",potato:"감자",tortilla:"또띠아칩",seaweed:"해초",natto:"낫또",onion:"양파",tomato:"토마토",olive:"올리브",nuts:"견과류",mayo:"마요네즈",spicy:"매운 재료",diet:"다이어트",protein:"고단백",light:"가볍게",filling:"든든하게",balanced:"균형 있게",any:"아무거나",flatbread:"플랫브레드",white:"화이트",wheat:"위트",parmesan:"파마산 오레가노",honeyOat:"허니오트",avoidPrepPork:"프레퍼스 돼지고기 덜 추천",avoidPrepRice:"프레퍼스 밥 메뉴 덜 추천"};
const M=(id,name,price,ing,nutrition,sauce,priceDate,priceSource,nutritionSource)=>({id,name,price,ing,nutrition,sauce,priceDate,priceSource,nutritionSource});
const STORES=[
{id:"prep",name:"프레퍼스",branch:"마곡나루역점",menus:[M("prep-cp","치킨 샐러드 파스타",8900,["chicken","pasta"],{calories:411,protein:43,carbs:49,fat:3},"발사믹 계열","2026-01-26","2026 가격 자료","공식 단백질·공개 영양성분표"),M("prep-pp","포크 샐러드 파스타",8900,["pork","pasta"],{calories:437,protein:44,carbs:50,fat:7},"발사믹 계열","2026-01-26","2026 가격 자료","공식 단백질·공개 영양성분표"),M("prep-bp","비프 샐러드 파스타",13900,["beef","pasta"],{calories:578,protein:50,carbs:54,fat:18},"발사믹 계열","2026-06-10","마곡나루역점 방문 가격","공식 단백질·공개 영양성분표"),M("prep-cr","치킨 데리야끼 덮밥",9900,["chicken","grain"],{calories:492,protein:44,carbs:74,fat:4},"데리야끼","2026-01-26","2026 가격 자료","공식 단백질·공개 영양성분표")]},
{id:"salady",name:"샐러디",branch:"마곡나루역점",menus:[M("sal-r","로스트닭다리살 샐러디",12000,["chicken"],{calories:259.2,protein:13.2,carbs:29.7,fat:9.6},"기본 구성","2026-01","2026 가격 자료","샐러디 공식 2026.06 영양성분표"),M("sal-s","그라브락스 연어 샐러디",13700,["salmon"],{calories:247.3,protein:21,carbs:7.8,fat:14.4},"기본 구성","2026-01","2026 가격 자료","샐러디 공식 2026.06 영양성분표"),M("sal-b","우삼겹메밀면 누들볼",10700,["beef","buckwheat","onion"],{calories:406.6,protein:18,carbs:36.1,fat:21.2},"기본 구성","2026-01","2026 가격 자료","샐러디 공식 2026.06 영양성분표"),M("sal-p","고소삼겹 들기름파스타 누들볼",10900,["pork","pasta"],{calories:445.3,protein:16,carbs:42.8,fat:24},"기본 구성","2026-01","2026 가격 자료","샐러디 공식 2026.06 영양성분표")]},
{id:"poke",name:"포케올데이",branch:"마곡나루역점",menus:[M("poke-t","곡물밥 스파이시 참치 포케",12900,["tuna","grain","spicy"],{calories:622.7,protein:33.5,carbs:68,fat:17.5},"유자 간장","2026-04-22","마곡나루역점 방문 가격","공식 계산기 구성요소 합산"),M("poke-d","곡물밥 훈제오리 포케",11900,["grain"],{calories:732,protein:25.2,carbs:70,fat:31.6},"비건 크리미 어니언","2026-05-23","마곡나루역점 주문 가격","공식 계산기 구성요소 합산")]},
{id:"slow",name:"슬로우캘리",branch:"마곡나루점",menus:[M("slow-s","클래식 연어 포케",12500,["salmon","grain","seaweed"],{calories:569,protein:30,carbs:79,fat:15},"클래식 간장","2026-04-29","2026 가격 자료","슬로우캘리 영양성분 자료")]},
{id:"subway",name:"써브웨이",branch:"마곡나루역점",menus:[M("sub-e","에그마요 15cm",6200,["egg","mayo","onion","tomato","olive"],{calories:453,protein:16.9,carbs:44,fat:25},"스위트 어니언","2026-06-24","2026 메뉴 가격","위트 기본 영양표+소스 합산"),M("sub-b","이탈리안 비엠티 15cm",7200,["pork","onion","tomato","olive"],{calories:403,protein:21,carbs:44,fat:16},"머스타드","2026-01-22","2026 메뉴 가격","위트 기본 영양표+소스 합산"),M("sub-r","로티세리 바비큐 치킨 15cm",7800,["chicken","onion","tomato","olive"],{calories:328,protein:29.1,carbs:39,fat:6},"레드와인 식초","2026-01-22","2026 메뉴 가격","위트 기본 영양표+소스 합산"),M("sub-sh","쉬림프 15cm",8200,["shrimp","onion","tomato","olive"],{calories:281,protein:16.3,carbs:41,fat:3.1},"스위트칠리","2026-06-24","2026 메뉴 가격","위트 기본 영양표+소스 합산"),M("sub-st","스테이크 & 치즈 15cm",8500,["beef","onion"],{calories:451.5,protein:28.5,carbs:42,fat:18},"치폴레","2026-01-22","2026 메뉴 가격","위트 기본 영양표+소스 합산")]}
];
const TARGET={diet:{label:"다이어트",min:250,max:450,protein:18},protein:{label:"고단백",min:300,max:700,protein:30},light:{label:"가볍게",min:200,max:400,protein:12},filling:{label:"든든하게",min:500,max:800,protein:25},balanced:{label:"균형 있게",min:350,max:650,protein:20},any:{label:"아무거나",min:0,max:9999,protein:0}};
const PREF_KEY="salad.preferences",HISTORY_KEY="salad.history",LEGACY_PREF=["salad.pref.v3","saladApp.preferences.v2","saladApp.preferences.v1"],LEGACY_HIST=["salad.history.v3","saladApp.history.v1"];
const DEF=()=>({proteins:["chicken","salmon","egg"],extras:["avocado","pasta"],excluded:["seaweed","natto"],bread:"flatbread",storePrefs:["avoidPrepPork","avoidPrepRice"]});const read=(k,d)=>{try{return JSON.parse(localStorage.getItem(k))??d}catch{return d}};function migrate(main,keys,d){let v=read(main,null);if(v)return v;for(const k of keys){v=read(k,null);if(v){localStorage.setItem(main,JSON.stringify(v));return v}}return d}
let pref={...DEF(),...migrate(PREF_KEY,LEGACY_PREF,{})},draft=structuredClone(pref),storeId="random",goal="balanced",current=null;const $=id=>document.getElementById(id),fmt=n=>new Intl.NumberFormat("ko-KR").format(n)+"원",labels=a=>a.map(x=>L[x]||x).join(" · ");
function renderSummary(){$("summary").innerHTML=`<div class="summary"><div><strong>단백질</strong><span>${labels(pref.proteins)}</span></div><div><strong>추가 재료</strong><span>${labels(pref.extras)}</span></div><div><strong>제외 재료</strong><span>${labels(pref.excluded)}</span></div><div><strong>써브웨이 빵</strong><span>${L[pref.bread]}</span></div><div><strong>매장 취향</strong><span>${labels(pref.storePrefs)}</span></div></div>`}function renderStores(){$("stores").innerHTML=`<button class="pick random ${storeId==="random"?"active":""}" data-s="random">🎲 전체 매장에서 추천</button>`+STORES.map(s=>`<button class="pick ${storeId===s.id?"active":""}" data-s="${s.id}">${s.name}<br><small>${s.branch}</small></button>`).join("");document.querySelectorAll("[data-s]").forEach(b=>b.onclick=()=>{storeId=b.dataset.s;renderStores()})}function renderGoals(){$("purposes").innerHTML=Object.keys(TARGET).map(x=>`<button class="pick ${goal===x?"active":""}" data-g="${x}">${L[x]}</button>`).join("");document.querySelectorAll("[data-g]").forEach(b=>b.onclick=()=>{goal=b.dataset.g;renderGoals();renderTarget()})}function renderTarget(){const t=TARGET[goal];$("targetText").textContent=t.min?`목표 ${t.min}~${t.max}kcal · 단백질 ${t.protein}g 이상 우선`:`칼로리 제한 없이 취향 적합도를 우선합니다.`}
function chips(id,items,key){$(id).innerHTML=items.map(x=>`<button class="chip ${draft[key].includes(x)?"active":""}" data-k="${key}" data-v="${x}">${L[x]}</button>`).join("");$(id).querySelectorAll("button").forEach(b=>b.onclick=()=>{const {k,v}=b.dataset;draft[k]=draft[k].includes(v)?draft[k].filter(x=>x!==v):[...draft[k],v];if(k==="extras"&&draft.extras.includes(v))draft.excluded=draft.excluded.filter(x=>x!==v);if(k==="excluded"&&draft.excluded.includes(v))draft.extras=draft.extras.filter(x=>x!==v);renderPrefs()})}function renderPrefs(){chips("proteins",["chicken","pork","beef","salmon","tuna","shrimp","egg","tofu"],"proteins");chips("extras",["avocado","pasta","buckwheat","grain","mushroom","sweetPotato","pumpkin","corn","cheese","chickpea","edamame","cucumber","carrot","broccoli","potato","tortilla"],"extras");chips("excluded",["seaweed","natto","onion","tomato","olive","nuts","mayo","spicy"],"excluded");chips("storePrefs",["avoidPrepPork","avoidPrepRice"],"storePrefs");$("breads").innerHTML=["flatbread","white","wheat","parmesan","honeyOat"].map(x=>`<button class="pick ${draft.bread===x?"active":""}" data-b="${x}">${L[x]}</button>`).join("");document.querySelectorAll("[data-b]").forEach(b=>b.onclick=()=>{draft.bread=b.dataset.b;renderPrefs()})}
function score(s,m){const t=TARGET[goal],n=m.nutrition;let v=0;if(n.calories>=t.min&&n.calories<=t.max)v+=40;else{const d=n.calories<t.min?t.min-n.calories:n.calories-t.max;v-=Math.min(35,d/8)}if(n.protein>=t.protein)v+=25+Math.min(10,(n.protein-t.protein)/2);else v-=(t.protein-n.protein)*1.5;if(goal==="balanced"&&n.protein*4/n.calories>=.18)v+=8;v+=m.ing.filter(x=>pref.proteins.includes(x)).length*6+m.ing.filter(x=>pref.extras.includes(x)).length*3;if(s.id==="prep"&&pref.storePrefs.includes("avoidPrepPork")&&m.ing.includes("pork"))v-=15;if(s.id==="prep"&&pref.storePrefs.includes("avoidPrepRice")&&m.ing.includes("grain"))v-=12;return v}
function recommend(){const stores=storeId==="random"?STORES:STORES.filter(s=>s.id===storeId),c=[];stores.forEach(s=>s.menus.filter(m=>!m.ing.some(x=>pref.excluded.includes(x))).forEach(m=>c.push({s,m,n:score(s,m)})));if(!c.length)return alert("제외 조건에 맞는 메뉴가 없습니다.");c.sort((a,b)=>b.n-a.n);const top=c.slice(0,Math.min(3,c.length)),r=Math.random(),idx=r<.7?0:r<.9?Math.min(1,top.length-1):Math.min(2,top.length-1);let p=top[idx];if(current&&p.m.id===current.m.id&&top.length>1)p=top[1];current=p;renderResult()}
function renderResult(){const {s,m,n}=current,t=TARGET[goal],u=m.nutrition,kok=u.calories>=t.min&&u.calories<=t.max,pok=u.protein>=t.protein,bread=s.id==="subway"?pref.bread:null;$("result").innerHTML=`<span class="badge">영양정보 기반 추천</span><h2>${s.name} · ${m.name}</h2><p class="muted">${s.branch} · 적합도 ${Math.round(n)}점</p><div class="order"><div class="line"><span>기본 메뉴</span><strong>${fmt(m.price)}</strong></div>${bread?`<div class="line"><span>선호 빵</span><strong>${L[bread]}</strong></div>`:""}<div class="line"><span>소스</span><strong>${m.sauce}</strong></div></div><div class="total"><span>총 예상 금액</span><span>${fmt(m.price)}</span></div><div class="order"><div class="line"><span>열량</span><strong>${Math.round(u.calories)} kcal</strong></div><div class="line"><span>단백질</span><strong>${u.protein.toFixed(1)} g</strong></div><div class="line"><span>탄수화물</span><strong>${u.carbs.toFixed(1)} g</strong></div><div class="line"><span>지방</span><strong>${u.fat.toFixed(1)} g</strong></div></div><div class="notice"><strong>${t.label} 기준</strong><br>${t.min?`목표 열량 ${t.min}~${t.max}kcal · 단백질 ${t.protein}g 이상`:"칼로리 제한 없음"}<br><span class="${kok?"good":"warn"}">${kok?"✓ 열량 기준 충족":"△ 열량 기준과 차이 있음"}</span> · <span class="${pok?"good":"warn"}">${pok?"✓ 단백질 기준 충족":"△ 단백질 기준 미달"}</span></div><div class="actions" style="margin-top:14px"><button class="btn primary" id="approve">이 메뉴로 결정</button><button class="btn" id="again">다시 추천</button></div><div class="notice">가격 기준: ${m.priceDate} · ${m.priceSource}<br>영양 기준: ${m.nutritionSource}<br>실제 조리량과 지점별 구성에 따라 달라질 수 있습니다.</div>`;$("result").classList.remove("hidden");$("again").onclick=recommend;$("approve").onclick=approve;$("result").scrollIntoView({behavior:"smooth"})}
function approve(){const h=migrate(HISTORY_KEY,LEGACY_HIST,[]);h.unshift({d:new Date().toISOString(),store:current.s.name,menu:current.m.name,price:current.m.price,calories:current.m.nutrition.calories,protein:current.m.nutrition.protein});localStorage.setItem(HISTORY_KEY,JSON.stringify(h.slice(0,5)));renderHistory()}function renderHistory(){const h=migrate(HISTORY_KEY,LEGACY_HIST,[]);$("history").innerHTML=h.length?h.map(x=>`<article><strong>${x.store} · ${x.menu}</strong><br>${x.price?fmt(x.price):"가격 미저장"} · ${x.calories?Math.round(x.calories)+"kcal":"영양정보 미저장"}<br><small class="muted">${new Date(x.d||x.date).toLocaleString("ko-KR")}</small></article>`).join(""):`<p class="muted">아직 결정한 메뉴가 없습니다.</p>`}
$("openPref").onclick=()=>{draft=structuredClone(pref);renderPrefs();$("modal").classList.add("open")};$("closePref").onclick=()=>$("modal").classList.remove("open");$("resetPref").onclick=()=>{draft=DEF();renderPrefs()};$("savePref").onclick=()=>{pref=structuredClone(draft);localStorage.setItem(PREF_KEY,JSON.stringify(pref));renderSummary();$("modal").classList.remove("open")};$("recommend").onclick=recommend;renderSummary();renderStores();renderGoals();renderTarget();renderHistory();
</script></body></html>
