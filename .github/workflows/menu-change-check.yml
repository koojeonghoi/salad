name: Daily official menu change check

on:
  schedule:
    # 매일 한국시간 오전 9시 10분
    # GitHub Actions의 cron은 UTC 기준이므로 00:10으로 설정
    - cron: "10 0 * * *"

  # Actions 화면에서 수동 실행 가능
  workflow_dispatch:

permissions:
  contents: write
  issues: write

concurrency:
  group: official-menu-monitor
  cancel-in-progress: false

jobs:
  detect:
    name: detect
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v7
        with:
          python-version: "3.12"

      - name: Detect official menu changes
        id: check
        shell: bash
        run: |
          set +e

          python scripts/check_menu_changes.py
          code=$?

          set -e

          echo "exit_code=$code" >> "$GITHUB_OUTPUT"

          # Python 검사 결과 코드
          # 0: 변경 없음 또는 최초 스냅샷 생성
          # 1: 공식 페이지 접근 오류
          # 2: 공식 메뉴 페이지 변경 감지

          exit 0

      - name: Commit first-run snapshots
        if: steps.check.outputs.exit_code == '0'
        shell: bash
        run: |
          if [ -n "$(git status --porcelain snapshots)" ]; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

            git add snapshots menu-change-report.md
            git commit -m "chore: initialize official menu snapshots"
            git push
          else
            echo "새로 생성된 기준 스냅샷이 없습니다."
          fi

      - name: Upload menu change report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: menu-change-report
          path: |
            menu-change-report.md
            snapshots/*.candidate.txt
          if-no-files-found: ignore
          retention-days: 14

      - name: Create menu change issue
        if: steps.check.outputs.exit_code == '2'
        uses: peter-evans/create-issue-from-file@v6
        with:
          title: "[메뉴 변경 감지] 공식 메뉴 페이지 확인 필요"
          content-filepath: menu-change-report.md

      - name: Create menu fetch error issue
        if: steps.check.outputs.exit_code == '1'
        uses: peter-evans/create-issue-from-file@v6
        with:
          title: "[메뉴 확인 오류] 공식 페이지 수집 실패"
          content-filepath: menu-change-report.md
