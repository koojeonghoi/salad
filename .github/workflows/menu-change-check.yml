name: Daily official menu change check

on:
  schedule:
    # Every day at 09:10 KST (00:10 UTC)
    - cron: "10 0 * * *"
  workflow_dispatch:

permissions:
  contents: write
  issues: write

concurrency:
  group: official-menu-monitor
  cancel-in-progress: false

jobs:
  detect:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Detect menu changes
        id: check
        continue-on-error: true
        run: |
          set +e
          python scripts/check_menu_changes.py
          code=$?
          set -e
          echo "exit_code=$code" >> "$GITHUB_OUTPUT"
          exit 0

      - name: Commit first-run snapshots
        if: steps.check.outputs.exit_code == '0'
        run: |
          if [ -n "$(git status --porcelain snapshots)" ]; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add snapshots menu-change-report.md
            git commit -m "chore: initialize official menu snapshots"
            git push
          fi

      - name: Upload report and candidate snapshots
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: menu-change-report
          path: |
            menu-change-report.md
            snapshots/*.candidate.txt
          if-no-files-found: ignore
          retention-days: 14

      - name: Create or update change issue
        if: steps.check.outputs.exit_code == '2'
        uses: peter-evans/create-issue-from-file@v5
        with:
          title: "[메뉴 변경 감지] 공식 메뉴 페이지 확인 필요"
          content-filepath: menu-change-report.md

      - name: Create fetch-error issue
        if: steps.check.outputs.exit_code == '1'
        uses: peter-evans/create-issue-from-file@v5
        with:
          title: "[메뉴 확인 오류] 공식 페이지 수집 실패"
          content-filepath: menu-change-report.md
