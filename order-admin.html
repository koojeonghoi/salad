<!doctype html><html lang="ko"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>단체 주문 관리</title><style>
:root{--p:#176b3a;--pd:#0e4b29;--ps:#eaf7ef;--bg:#f2f6f3;--tx:#17221c;--mu:#6b776f;--ln:#dce6df;--red:#c52b22;--shadow:0 18px 48px rgba(25,63,40,.11)}*{box-sizing:border-box}body{margin:0;color:var(--tx);background:linear-gradient(180deg,#eaf4ee,#f7f9f8 360px);font:16px/1.55 -apple-system,BlinkMacSystemFont,"Segoe UI","Noto Sans KR",sans-serif}.wrap{width:min(100% - 28px,920px);margin:auto;padding:28px 0 72px}.hero{padding:34px;border-radius:30px;color:#fff;background:linear-gradient(135deg,#0d4827,#18713d 62%,#2d8a50);box-shadow:0 21px 50px #104c2a35;margin-bottom:19px}.hero h1{margin:10px 0 7px;font-size:clamp(1.9rem,5vw,2.6rem)}.hero p{margin:0;color:#ffffffd6}.kicker{display:inline-flex;padding:6px 11px;border-radius:999px;background:#ffffff1f;font-size:.8rem;font-weight:900}.card{padding:27px;border:1px solid #d6e3da;border-radius:25px;background:#fffffff2;box-shadow:var(--shadow);margin-bottom:18px}h2,p{margin-top:0}h2{margin-bottom:6px;font-size:1.45rem}.sub{color:var(--mu);margin-bottom:23px}.field{margin-bottom:17px}.field label{display:block;margin-bottom:7px;font-weight:850}.field input,.field select,.field textarea{width:100%;min-height:51px;padding:12px 14px;color:var(--tx);background:#fff;border:1px solid var(--ln);border-radius:14px;font:inherit}.field textarea{min-height:95px}.grid{display:grid;grid-template-columns:1fr 1fr;gap:0 14px}.full{grid-column:1/-1}.btn{display:inline-flex;align-items:center;justify-content:center;min-height:47px;padding:10px 17px;color:var(--tx);background:#fff;border:1px solid var(--ln);border-radius:14px;font:inherit;font-weight:850;text-decoration:none;cursor:pointer}.hero .btn{margin-top:20px;color:var(--pd)}.primary{color:#fff;background:linear-gradient(135deg,var(--p),#23854a);border-color:transparent}.danger{color:var(--red);background:#fff1ef;border-color:#f0c8c4}.wide{width:100%;min-height:55px}.hidden{display:none!important}.notice{color:#704600;background:#fff8e6}.ok{color:#155b32;background:#eef9f2}.room{background:linear-gradient(145deg,#f2fbf6,#edf7ff)}.status{display:inline-flex;padding:6px 10px;border-radius:999px;color:var(--p);background:#dff4e7;font-weight:900}.meta,.actions{display:flex;gap:9px;flex-wrap:wrap}.meta{margin:13px 0 20px}.chip{padding:6px 10px;border:1px solid var(--ln);border-radius:999px;background:#fff}.share{display:grid;grid-template-columns:1fr auto;gap:9px}.summary{padding:17px;border-radius:18px;color:#fff;background:linear-gradient(135deg,#145f35,#0e4b29);margin-bottom:18px;display:flex;justify-content:space-between}.tabs{display:grid;grid-template-columns:1fr 1fr;gap:7px;padding:5px;border-radius:16px;background:#edf3ef;margin-bottom:18px}.tabs .btn{border:0;background:transparent}.tabs .active{background:#fff;color:var(--pd);box-shadow:0 5px 14px #1e412b18}.group,.person{padding:17px 3px;border-bottom:1px solid #e9efeb}.empty{padding:36px 18px;text-align:center;color:var(--mu);background:#f8faf9;border:1px dashed #cbd9d0;border-radius:18px}.footer{display:flex;gap:9px;flex-wrap:wrap;margin-top:20px;padding-top:19px;border-top:1px solid var(--ln)}@media(max-width:640px){.wrap{width:min(100% - 20px,920px);padding-top:10px}.hero{padding:27px 23px}.card{padding:22px 18px}.grid{grid-template-columns:1fr}.full{grid-column:auto}.share{grid-template-columns:1fr}.share .btn{width:100%}}
</style></head><body><main class="wrap"><section class="hero"><span class="kicker">🥗 SALAD TOGETHER</span><h1>단체 주문 관리</h1><p>주문방을 만들고 팀의 메뉴를 한눈에 취합하세요.</p><a class="btn" href="index.html">← 추천 화면으로</a></section><section id="connection" class="card notice"><strong>Firebase 연결 확인 중...</strong></section><section id="create" class="card"><h2>새 주문방 만들기</h2><p class="sub">주문방 이름, 담당자와 매장을 선택하세요.</p><div class="grid"><div class="field full"><label>주문방 이름</label><input id="title" value="오늘 점심 주문"></div><div class="field"><label>담당자 이름</label><input id="manager" placeholder="이름 입력"></div><div class="field"><label>주문 매장</label><select id="store"><option>매장 불러오는 중...</option></select></div><div class="field full"><label>참여자 안내사항 (선택)</label><textarea id="notice" placeholder="예: 요청사항이 있으면 함께 입력해주세요."></textarea></div></div><button id="make" class="btn primary wide" disabled>주문방 만들기 →</button></section><section id="dash" class="hidden"><section class="card room"><span id="status" class="status">● 주문 접수 중</span><h2 id="roomTitle" style="margin-top:12px"></h2><div id="roomInfo" class="meta"></div><div class="field"><label>참여 링크</label><div class="share"><input id="share" readonly><button id="copyLink" class="btn primary">링크 복사</button></div></div><div class="actions"><button id="newRoom" class="btn">새 주문방</button><button id="closeRoom" class="btn danger">주문 접수 마감</button></div></section><section class="card"><h2>실시간 주문 현황</h2><p class="sub">참여자의 주문이 자동으로 반영됩니다.</p><div class="tabs"><button id="byMenu" class="btn active">메뉴별 보기</button><button id="byPerson" class="btn">참여자별 보기</button></div><div id="stats"></div><div id="orders"></div><div class="footer"><button id="copyOrder" class="btn primary">주문서 복사</button><button id="csv" class="btn">CSV 다운로드</button></div></section></section></main>
<script type="module">
import{initializeApp}from'https://www.gstatic.com/firebasejs/12.1.0/firebase-app.js';import{getAuth,signInAnonymously}from'https://www.gstatic.com/firebasejs/12.1.0/firebase-auth.js';import{getDatabase,ref,set,update,onValue}from'https://www.gstatic.com/firebasejs/12.1.0/firebase-database.js';import{firebaseConfig}from'./firebase-config.js';
const STORES=[['prep','프레퍼스'],['salady','샐러디'],['poke','포케올데이'],['slow','슬로우캘리'],['subway','써브웨이']].map(([id,name])=>({id,name}));
const $=id=>document.getElementById(id),fmt=n=>n.toLocaleString('ko-KR')+'원';let db,user,roomId,info,orders=[],mode='menu',unsubs=[];
function connection(text,ok=false){$('connection').className='card '+(ok?'ok':'notice');$('connection').innerHTML=text}
async function init(){try{$('store').innerHTML=STORES.map(s=>`<option value="${s.id}">${s.name}</option>`).join('');const app=initializeApp(firebaseConfig);db=getDatabase(app);user=(await signInAnonymously(getAuth(app))).user;connection(`<strong>Firebase 연결 완료</strong><br>주문방을 만들 수 있습니다.`,true);$('make').disabled=false;localStorage.removeItem('salad.manager.room')}catch(e){connection(`<strong>Firebase 연결 실패</strong><br>${e.code||e.message}`)}}
function roomCode(){return crypto.getRandomValues(new Uint32Array(1))[0].toString(36).slice(0,6).toUpperCase().padEnd(6,'X')}
async function make(){try{if(!user)return alert('Firebase 연결이 완료되지 않았습니다.');const manager=$('manager').value.trim();if(!manager)return alert('담당자 이름을 입력하세요.');const store=STORES.find(s=>s.id===$('store').value);roomId=roomCode();await set(ref(db,`saladOrders/rooms/${roomId}/info`),{title:$('title').value.trim()||'오늘 점심 주문',managerUid:user.uid,managerName:manager,storeId:store.id,storeName:store.name,status:'open',notice:$('notice').value.trim(),createdAt:Date.now()});watch()}catch(e){alert(`주문방 생성 실패: ${e.code||e.message}`)}}
function clearListeners(){unsubs.forEach(fn=>fn());unsubs=[]}
function watch(){clearListeners();unsubs.push(onValue(ref(db,`saladOrders/rooms/${roomId}/info`),s=>{info=s.val();if(!info){localStorage.removeItem('salad.manager.room');return}show()}));unsubs.push(onValue(ref(db,`saladOrders/rooms/${roomId}/orders`),s=>{orders=Object.values(s.val()||{}).filter(x=>x.status==='submitted');render()}))}
function show(){$('create').classList.add('hidden');$('dash').classList.remove('hidden');$('roomTitle').textContent=info.title;$('status').textContent=info.status==='open'?'● 주문 접수 중':'● 주문 마감';$('roomInfo').innerHTML=`<span class="chip">🏪 ${info.storeName}</span><span class="chip">👤 담당 ${info.managerName}</span><span class="chip">방 코드 ${roomId}</span>`;$('share').value=new URL(`index.html?room=${roomId}`,location.href).href;$('closeRoom').disabled=info.status!=='open'}
function grouped(){const g={};orders.forEach(o=>{g[o.menuName]??={qty:0,total:0,people:[]};g[o.menuName].qty++;g[o.menuName].total+=o.price;g[o.menuName].people.push(o)});return g}
function empty(){return '<div class="empty">🥗<br><strong>아직 제출된 주문이 없어요</strong><br>참여 링크를 공유하세요.</div>'}
function render(){$('stats').innerHTML=`<div class="summary"><strong>참여 ${orders.length}명</strong><b>${fmt(orders.reduce((a,o)=>a+o.price,0))}</b></div>`;$('orders').innerHTML=mode==='menu'?(Object.entries(grouped()).map(([name,g])=>`<div class="group"><strong>${name} · ${g.qty}개 · ${fmt(g.total)}</strong><br>${g.people.map(o=>`${o.name}${o.sauce?' · 소스: '+o.sauce:''}${o.request?' — '+o.request:''}`).join('<br>')}</div>`).join('')||empty()):(orders.map(o=>`<div class="person"><strong>${o.name}</strong><br>${o.menuName} · ${fmt(o.price)}${o.sauce?'<br>추천 소스: '+o.sauce:''}${o.request?'<br>요청: '+o.request:''}</div>`).join('')||empty())}
function text(){const a=[`[${info.title}]`,info.storeName,''];Object.entries(grouped()).forEach(([n,g])=>{a.push(`${n} ${g.qty}개`);g.people.forEach(o=>{if(o.sauce)a.push(`- ${o.name} 소스: ${o.sauce}`);if(o.request)a.push(`- ${o.name} 요청: ${o.request}`)});a.push('')});a.push(`총 ${orders.length}개 / ${fmt(orders.reduce((x,o)=>x+o.price,0))}`);return a.join('\n')}
function downloadCsv(){const q=v=>'"'+String(v??'').replaceAll('"','""')+'"',rows=[['이름','매장','메뉴','가격','칼로리','단백질','추천소스','요청사항'],...orders.map(o=>[o.name,o.storeName,o.menuName,o.price,o.calories,o.protein,o.sauce||'',o.request])],blob=new Blob(['\ufeff'+rows.map(r=>r.map(q).join(',')).join('\n')],{type:'text/csv;charset=utf-8'}),a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download=`salad-order-${roomId}.csv`;a.click()}
$('make').onclick=make;$('copyLink').onclick=async()=>{await navigator.clipboard.writeText($('share').value);alert('참여 링크를 복사했습니다.')};$('closeRoom').onclick=()=>confirm('주문 접수를 마감할까요?')&&update(ref(db,`saladOrders/rooms/${roomId}/info`),{status:'closed'});$('newRoom').onclick=()=>{clearListeners();roomId=null;info=null;orders=[];$('dash').classList.add('hidden');$('create').classList.remove('hidden');$('title').value='오늘 점심 주문';$('manager').value='';$('notice').value='';window.scrollTo({top:0,behavior:'smooth'})};$('copyOrder').onclick=()=>navigator.clipboard.writeText(text());$('csv').onclick=downloadCsv;$('byMenu').onclick=()=>{mode='menu';$('byMenu').classList.add('active');$('byPerson').classList.remove('active');render()};$('byPerson').onclick=()=>{mode='person';$('byPerson').classList.add('active');$('byMenu').classList.remove('active');render()};init();
</script></body></html>
