<!doctype html><html lang="ko"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>단체 주문 관리</title><style>
:root{--g:#24753a;--gd:#154d28;--lg:#eaf6ed;--bg:#f4f7f5;--tx:#202624;--mu:#66716b;--ln:#dfe6e1;--red:#b42318}*{box-sizing:border-box}body{margin:0;background:var(--bg);color:var(--tx);font:17px/1.58 -apple-system,BlinkMacSystemFont,"Segoe UI","Noto Sans KR",sans-serif}.wrap{max-width:820px;margin:auto;padding:20px 16px 70px}.hero,.card{padding:23px;border-radius:23px;margin-bottom:15px}.hero{color:#fff;background:linear-gradient(135deg,var(--gd),var(--g))}.card{background:#fff;border:1px solid var(--ln);box-shadow:0 8px 24px #183f2710}h1,h2,h3,p{margin-top:0}h1{font-size:2.1rem;margin-bottom:6px}h2{font-size:1.4rem}.muted{color:var(--mu);font-size:.95rem}.grid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px}.row,.actions{display:flex;gap:9px;flex-wrap:wrap;align-items:center}.btn,input,select,textarea{font:inherit;border:1px solid var(--ln);border-radius:13px;padding:11px;background:#fff}.btn{font-weight:750;cursor:pointer}.primary{color:#fff;background:var(--g);border-color:var(--g)}.danger{color:#fff;background:var(--red);border-color:var(--red)}.wide{width:100%}.pick{min-height:60px}.active{background:var(--lg);border-color:var(--g);color:#145526}.field{margin:14px 0}.field label{display:block;margin-bottom:6px;font-weight:800}.field input,.field select,.field textarea{width:100%}.hidden{display:none!important}.badge{display:inline-block;padding:5px 10px;border-radius:99px;background:var(--lg);color:#145526;font-size:.85rem;font-weight:850}.order{border:1px solid var(--ln);border-radius:14px;overflow:hidden;margin:14px 0}.line{display:flex;justify-content:space-between;gap:12px;padding:12px 14px;border-bottom:1px solid var(--ln)}.line:last-child{border:0}.total{display:flex;justify-content:space-between;padding:15px;background:var(--gd);color:#fff;border-radius:14px;font-weight:900}.notice{padding:12px;border-radius:12px;background:#fff6dd;color:#704600;margin:12px 0}.room{background:#eef7ff;border-color:#bedaff}.person{padding:12px 0;border-bottom:1px solid var(--ln)}.menu-group{padding:14px;border:1px solid var(--ln);border-radius:14px;margin:10px 0}.tabs{display:flex;gap:8px;margin-bottom:12px}.tabs .btn{flex:1}.status{font-weight:800}.ok{color:#17642d}.bad{color:var(--red)}a{color:inherit}@media(min-width:680px){.stores{grid-template-columns:repeat(3,1fr)}}
</style></head><body><main class="wrap"><section class="hero"><h1>단체 주문 관리</h1><p>주문방 생성, 실시간 취합, 마감 및 주문서 복사</p><a class="btn" href="index.html">추천 화면으로</a></section><section id="setup" class="card notice hidden"><strong>Firebase 설정 필요</strong><br><code>firebase-config.js</code>의 설정값을 입력하세요.</section>
<section id="create" class="card"><h2>주문방 만들기</h2><div class="field"><label>주문방 이름</label><input id="title" value="오늘 점심 주문"></div><div class="field"><label>담당자 이름</label><input id="manager" maxlength="20"></div><div class="field"><label>주문 매장</label><select id="store"></select></div><div class="field"><label>마감 시간</label><input id="deadline" type="datetime-local"></div><div class="field"><label>공지사항</label><textarea id="notice" maxlength="300" placeholder="예: 오전 11시까지 선택해주세요."></textarea></div><button id="make" class="btn primary wide">주문방 생성</button></section>
<section id="dashboard" class="hidden"><section class="card room"><span class="badge">관리 중</span><h2 id="roomTitle"></h2><p id="roomInfo"></p><div class="field"><label>참여 링크</label><input id="share" readonly></div><div class="actions"><button id="copyLink" class="btn">링크 복사</button><button id="closeRoom" class="btn danger">주문 마감</button></div></section><section class="card"><div class="tabs"><button id="byMenu" class="btn active">메뉴별</button><button id="byPerson" class="btn">참여자별</button></div><div id="stats"></div><div id="orders"></div><div class="actions"><button id="copyOrder" class="btn primary">주문서 복사</button><button id="csv" class="btn">CSV 다운로드</button></div></section></section></main>
<script type="module">import{initializeApp}from'https://www.gstatic.com/firebasejs/12.1.0/firebase-app.js';import{getAuth,signInAnonymously}from'https://www.gstatic.com/firebasejs/12.1.0/firebase-auth.js';import{getDatabase,ref,set,update,onValue}from'https://www.gstatic.com/firebasejs/12.1.0/firebase-database.js';import{firebaseConfig}from'./firebase-config.js';import{STORES}from'./menu-data.js';const $=x=>document.getElementById(x),fmt=n=>n.toLocaleString('ko-KR')+'원';let auth,db,user,roomId,info,orders=[],mode='menu';const configured=!firebaseConfig.apiKey.includes('PASTE_');if(!configured)$('setup').classList.remove('hidden');$('store').innerHTML=STORES.map(s=>`<option value="${s.id}">${s.name}</option>`).join('');let d=new Date(Date.now()+60*60*1000);d.setMinutes(Math.ceil(d.getMinutes()/10)*10);$('deadline').value=new Date(d-d.getTimezoneOffset()*60000).toISOString().slice(0,16);
async function start(){if(!configured)return;let app=initializeApp(firebaseConfig);auth=getAuth(app);db=getDatabase(app);user=(await signInAnonymously(auth)).user;roomId=localStorage.getItem('salad.manager.room');if(roomId)watch();}
function code(){return Math.random().toString(36).slice(2,8).toUpperCase()}async function make(){if(!configured)return alert('Firebase 설정이 필요합니다.');let store=STORES.find(s=>s.id===$('store').value),deadline=new Date($('deadline').value).getTime(),manager=$('manager').value.trim();if(!manager||!deadline)return alert('담당자와 마감 시간을 입력하세요.');roomId=code();info={title:$('title').value.trim()||'오늘 점심 주문',managerUid:user.uid,managerName:manager,storeId:store.id,storeName:store.name,deadline,status:'open',notice:$('notice').value.trim(),createdAt:Date.now()};await set(ref(db,`saladOrders/rooms/${roomId}/info`),info);localStorage.setItem('salad.manager.room',roomId);watch()}
function watch(){onValue(ref(db,`saladOrders/rooms/${roomId}/info`),s=>{info=s.val();if(!info)return;showRoom()});onValue(ref(db,`saladOrders/rooms/${roomId}/orders`),s=>{orders=Object.values(s.val()||{}).filter(x=>x.status==='submitted');render()})}function showRoom(){$('create').classList.add('hidden');$('dashboard').classList.remove('hidden');$('roomTitle').textContent=info.title;$('roomInfo').textContent=`${info.storeName} · 담당 ${info.managerName} · ${info.status} · 마감 ${new Date(info.deadline).toLocaleString('ko-KR')}`;$('share').value=new URL(`index.html?room=${roomId}`,location.href).href;$('closeRoom').disabled=info.status!=='open'}
function grouped(){let g={};orders.forEach(o=>{g[o.menuName]??={qty:0,total:0,people:[]};g[o.menuName].qty++;g[o.menuName].total+=o.price;g[o.menuName].people.push(o)});return g}function render(){let total=orders.reduce((a,o)=>a+o.price,0);$('stats').innerHTML=`<div class="total"><span>참여 ${orders.length}명</span><span>${fmt(total)}</span></div>`;if(mode==='menu')$('orders').innerHTML=Object.entries(grouped()).map(([n,g])=>`<div class="menu-group"><h3>${n} · ${g.qty}개 · ${fmt(g.total)}</h3>${g.people.map(o=>`<div>${o.name}${o.request?' — '+o.request:''}</div>`).join('')}</div>`).join('')||'<p class="muted">아직 제출된 주문이 없습니다.</p>';else $('orders').innerHTML=orders.map(o=>`<div class="person"><strong>${o.name}</strong><br>${o.storeName} · ${o.menuName} · ${fmt(o.price)}${o.request?'<br>요청: '+o.request:''}</div>`).join('')||'<p class="muted">아직 제출된 주문이 없습니다.</p>'}
function orderText(){let lines=[`[${info.title}]`,`${info.storeName}`,``];Object.entries(grouped()).forEach(([n,g])=>{lines.push(`${n} ${g.qty}개`);g.people.filter(o=>o.request).forEach(o=>lines.push(`- ${o.name}: ${o.request}`));lines.push('')});lines.push(`총 ${orders.length}개 / ${fmt(orders.reduce((a,o)=>a+o.price,0))}`);return lines.join('
')}async function closeRoom(){if(confirm('주문을 마감할까요?'))await update(ref(db,`saladOrders/rooms/${roomId}/info`),{status:'closed'})}function downloadCsv(){let esc=v=>'"'+String(v??'').replaceAll('"','""')+'"',rows=[['이름','매장','메뉴','가격','칼로리','단백질','요청사항'],...orders.map(o=>[o.name,o.storeName,o.menuName,o.price,o.calories,o.protein,o.request])],blob=new Blob(['﻿'+rows.map(r=>r.map(esc).join(',')).join('
')],{type:'text/csv;charset=utf-8'}),a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download=`salad-order-${roomId}.csv`;a.click();URL.revokeObjectURL(a.href)}
$('make').onclick=make;$('copyLink').onclick=()=>navigator.clipboard.writeText($('share').value);$('closeRoom').onclick=closeRoom;$('copyOrder').onclick=()=>navigator.clipboard.writeText(orderText());$('csv').onclick=downloadCsv;$('byMenu').onclick=()=>{mode='menu';$('byMenu').classList.add('active');$('byPerson').classList.remove('active');render()};$('byPerson').onclick=()=>{mode='person';$('byPerson').classList.add('active');$('byMenu').classList.remove('active');render()};start();</script></body></html>
