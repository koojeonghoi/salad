<!doctype html><html lang="ko"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>단체 주문 관리</title><style>:root{--g:#24753a;--gd:#154d28;--bg:#f4f7f5;--tx:#202624;--ln:#dfe6e1;--red:#b42318}*{box-sizing:border-box}body{margin:0;background:var(--bg);color:var(--tx);font:17px/1.58 -apple-system,BlinkMacSystemFont,"Segoe UI","Noto Sans KR",sans-serif}.wrap{max-width:820px;margin:auto;padding:20px 16px}.hero,.card{padding:23px;border-radius:23px;margin-bottom:15px}.hero{color:#fff;background:linear-gradient(135deg,var(--gd),var(--g))}.card{background:#fff;border:1px solid var(--ln)}h1,h2,p{margin-top:0}.btn,input,select,textarea{font:inherit;color:var(--tx);background:#fff;border:1px solid var(--ln);border-radius:13px;padding:11px}.btn{font-weight:750;cursor:pointer;text-decoration:none}.hero .btn{color:var(--tx)!important;background:#fff!important}.primary{color:#fff!important;background:var(--g)!important}.danger{color:#fff!important;background:var(--red)!important}.wide{width:100%}.field{margin:15px 0}.field label{display:block;font-weight:800;margin-bottom:6px}.field input,.field select,.field textarea{width:100%}.actions,.tabs{display:flex;gap:9px;flex-wrap:wrap}.hidden{display:none!important}.room{background:#eef7ff}.total{display:flex;justify-content:space-between;padding:15px;background:var(--gd);color:#fff;border-radius:14px;font-weight:900}.group,.person{padding:13px;border-bottom:1px solid var(--ln)}.tabs .btn{flex:1}.active{background:#eaf6ed;border-color:var(--g)}.notice{background:#fff6dd;color:#704600}</style></head><body><main class="wrap"><section class="hero"><h1>단체 주문 관리</h1><p>주문방 생성과 실시간 메뉴 취합</p><a class="btn" href="index.html">추천 화면으로</a></section><section id="setup" class="card notice hidden">firebase-config.js 설정이 필요합니다.</section><section id="create" class="card"><h2>주문방 만들기</h2><div class="field"><label>주문방 이름</label><input id="title" value="오늘 점심 주문"></div><div class="field"><label>담당자 이름</label><input id="manager"></div><div class="field"><label>매장</label><select id="store"></select></div><div class="field"><label>마감 시간</label><input id="deadline" type="datetime-local"></div><div class="field"><label>공지</label><textarea id="notice"></textarea></div><button id="make" class="btn primary wide">주문방 생성</button></section><section id="dash" class="hidden"><section class="card room"><h2 id="roomTitle"></h2><p id="roomInfo"></p><div class="field"><label>참여 링크</label><input id="share" readonly></div><div class="actions"><button id="copyLink" class="btn">링크 복사</button><button id="closeRoom" class="btn danger">주문 마감</button></div></section><section class="card"><div class="tabs"><button id="byMenu" class="btn active">메뉴별</button><button id="byPerson" class="btn">참여자별</button></div><div id="stats"></div><div id="orders"></div><div class="actions"><button id="copyOrder" class="btn primary">주문서 복사</button><button id="csv" class="btn">CSV 다운로드</button></div></section></section></main><script type="module">import{initializeApp}from'https://www.gstatic.com/firebasejs/12.1.0/firebase-app.js';import{getAuth,signInAnonymously}from'https://www.gstatic.com/firebasejs/12.1.0/firebase-auth.js';import{getDatabase,ref,set,update,onValue}from'https://www.gstatic.com/firebasejs/12.1.0/firebase-database.js';import{firebaseConfig}from'./firebase-config.js';import{STORES}from'./menu-data.js';const $=x=>document.getElementById(x),fmt=n=>n.toLocaleString('ko-KR')+'원';let db,user,roomId,info,orders=[],mode='menu',configured=!firebaseConfig.apiKey.includes('PASTE_');if(!configured)$('setup').classList.remove('hidden');$('store').innerHTML=STORES.map(s=>`<option value="${s.id}">${s.name}</option>`).join('');let d=new Date(Date.now()+3600000);$('deadline').value=new Date(d-d.getTimezoneOffset()*60000).toISOString().slice(0,16);async function start(){if(!configured)return;let app=initializeApp(firebaseConfig);db=getDatabase(app);user=(await signInAnonymously(getAuth(app))).user;roomId=localStorage.getItem('salad.manager.room');if(roomId)watch()}function code(){return Math.random().toString(36).slice(2,8).toUpperCase()}async function make(){if(!configured)return alert('Firebase 설정이 필요합니다.');let store=STORES.find(s=>s.id===$('store').value),deadline=new Date($('deadline').value).getTime(),manager=$('manager').value.trim();if(!manager||!deadline)return alert('담당자와 시간을 입력하세요.');roomId=code();await set(ref(db,`saladOrders/rooms/${roomId}/info`),{title:$('title').value.trim(),managerUid:user.uid,managerName:manager,storeId:store.id,storeName:store.name,deadline,status:'open',notice:$('notice').value.trim(),createdAt:Date.now()});localStorage.setItem('salad.manager.room',roomId);watch()}function watch(){onValue(ref(db,`saladOrders/rooms/${roomId}/info`),s=>{info=s.val();if(info)show()});onValue(ref(db,`saladOrders/rooms/${roomId}/orders`),s=>{orders=Object.values(s.val()||{}).filter(x=>x.status==='submitted');render()})}function show(){$('create').classList.add('hidden');$('dash').classList.remove('hidden');$('roomTitle').textContent=info.title;$('roomInfo').textContent=`${info.storeName} · 담당 ${info.managerName} · ${info.status} · ${new Date(info.deadline).toLocaleString('ko-KR')}`;$('share').value=new URL(`index.html?room=${roomId}`,location.href).href}function grouped(){let g={};orders.forEach(o=>{g[o.menuName]??={qty:0,total:0,people:[]};g[o.menuName].qty++;g[o.menuName].total+=o.price;g[o.menuName].people.push(o)});return g}function render(){$('stats').innerHTML=`<div class="total"><span>참여 ${orders.length}명</span><span>${fmt(orders.reduce((a,o)=>a+o.price,0))}</span></div>`;$('orders').innerHTML=mode==='menu'?(Object.entries(grouped()).map(([n,g])=>`<div class="group"><strong>${n} · ${g.qty}개 · ${fmt(g.total)}</strong><br>${g.people.map(o=>`${o.name}${o.request?' — '+o.request:''}`).join('<br>')}</div>`).join('')||'아직 주문이 없습니다.'):(orders.map(o=>`<div class="person"><strong>${o.name}</strong><br>${o.menuName} · ${fmt(o.price)}${o.request?'<br>'+o.request:''}</div>`).join('')||'아직 주문이 없습니다.')}function text(){let a=[`[${info.title}]`,info.storeName,''];Object.entries(grouped()).forEach(([n,g])=>{a.push(`${n} ${g.qty}개`);g.people.filter(o=>o.request).forEach(o=>a.push(`- ${o.name}: ${o.request}`));a.push('')});a.push(`총 ${orders.length}개 / ${fmt(orders.reduce((x,o)=>x+o.price,0))}`);return a.join('\n')}function csv(){let q=v=>'"'+String(v??'').replaceAll('"','""')+'"',rows=[['이름','매장','메뉴','가격','칼로리','단백질','요청사항'],...orders.map(o=>[o.name,o.storeName,o.menuName,o.price,o.calories,o.protein,o.request])],blob=new Blob(['\ufeff'+rows.map(r=>r.map(q).join(',')).join('\n')],{type:'text/csv'}),a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download=`salad-order-${roomId}.csv`;a.click()}$('make').onclick=make;$('copyLink').onclick=()=>navigator.clipboard.writeText($('share').value);$('closeRoom').onclick=()=>confirm('마감할까요?')&&update(ref(db,`saladOrders/rooms/${roomId}/info`),{status:'closed'});$('copyOrder').onclick=()=>navigator.clipboard.writeText(text());$('csv').onclick=csv;$('byMenu').onclick=()=>{mode='menu';render()};$('byPerson').onclick=()=>{mode='person';render()};start();</script></body></html>
