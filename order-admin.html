<!doctype html>
<html lang="ko"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>단체 주문 관리</title>
<style>
:root{--p:#176b3a;--pd:#0e4b29;--ps:#eaf7ef;--bg:#f2f6f3;--tx:#17221c;--mu:#6b776f;--ln:#dce6df;--red:#c52b22;--shadow:0 18px 48px rgba(25,63,40,.11)}*{box-sizing:border-box}body{margin:0;color:var(--tx);background:linear-gradient(180deg,#eaf4ee 0,#f7f9f8 360px);font:16px/1.55 -apple-system,BlinkMacSystemFont,"Segoe UI","Noto Sans KR",sans-serif}.wrap{width:min(100% - 28px,920px);margin:auto;padding:28px 0 72px}.hero{position:relative;overflow:hidden;padding:34px;border-radius:30px;color:#fff;background:linear-gradient(135deg,#0d4827,#18713d 62%,#2d8a50);box-shadow:0 21px 50px rgba(16,76,42,.23);margin-bottom:19px}.hero:after{content:"";position:absolute;width:250px;height:250px;border-radius:50%;right:-80px;top:-120px;background:#ffffff18}.kicker{display:inline-flex;padding:6px 11px;border-radius:999px;background:#ffffff1f;font-size:.8rem;font-weight:900}.hero h1{position:relative;margin:14px 0 7px;font-size:clamp(1.9rem,5vw,2.6rem);letter-spacing:-.05em}.hero p{position:relative;margin:0;color:#ffffffd6}.card{padding:27px;border:1px solid #d6e3da;border-radius:25px;background:#fffffff2;box-shadow:var(--shadow);margin-bottom:18px}h2,h3,p{margin-top:0}h2{margin-bottom:6px;font-size:1.45rem;letter-spacing:-.03em}.sub{color:var(--mu);margin-bottom:23px}.section-head,.room-head{display:flex;align-items:flex-start;justify-content:space-between;gap:14px}.icon{display:grid;place-items:center;width:45px;height:45px;flex:0 0 45px;border-radius:15px;background:var(--ps);font-size:1.25rem}.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:0 14px}.full{grid-column:1/-1}.field{margin-bottom:17px}.field label{display:block;margin-bottom:7px;color:#314139;font-size:.92rem;font-weight:850}.field input,.field select,.field textarea{width:100%;min-height:51px;padding:12px 14px;color:var(--tx);background:#fff;border:1px solid var(--ln);border-radius:14px;outline:none;font:inherit;transition:.18s}.field textarea{min-height:95px;resize:vertical}.field input:focus,.field select:focus,.field textarea:focus{border-color:#449766;box-shadow:0 0 0 4px #24753a1a}.btn{display:inline-flex;align-items:center;justify-content:center;min-height:47px;padding:10px 17px;color:var(--tx);background:#fff;border:1px solid var(--ln);border-radius:14px;font:inherit;font-weight:850;text-decoration:none;cursor:pointer;transition:.16s}.btn:hover{transform:translateY(-1px);box-shadow:0 8px 18px #183f2718}.hero .btn{position:relative;margin-top:20px;color:var(--pd);background:#fff}.primary{color:#fff;background:linear-gradient(135deg,var(--p),#23854a);border-color:transparent}.danger{color:var(--red);background:#fff1ef;border-color:#f0c8c4}.wide{width:100%;min-height:55px}.hidden{display:none!important}.notice{color:#704600;background:#fff8e6;border-color:#f0deb4}.room{background:linear-gradient(145deg,#f2fbf6,#edf7ff)}.status{display:inline-flex;padding:6px 10px;border-radius:999px;color:var(--p);background:#dff4e7;font-size:.82rem;font-weight:900}.room h2{margin:12px 0 5px}.meta{display:flex;gap:8px;flex-wrap:wrap;margin:12px 0 21px}.chip{padding:6px 10px;border:1px solid var(--ln);border-radius:999px;background:#ffffffc9;color:#506057;font-size:.88rem}.share{display:grid;grid-template-columns:1fr auto;gap:9px}.share .btn{white-space:nowrap}.actions{display:flex;gap:9px;flex-wrap:wrap}.summary{padding:17px;border-radius:18px;color:#fff;background:linear-gradient(135deg,#145f35,#0e4b29);margin-bottom:18px}.summary small{display:block;color:#ffffffb8}.summary-row{display:flex;justify-content:space-between;align-items:flex-end;gap:15px}.summary strong{font-size:1.5rem}.summary b{font-size:1.1rem}.tabs{display:grid;grid-template-columns:1fr 1fr;gap:7px;padding:5px;border-radius:16px;background:#edf3ef;margin-bottom:18px}.tabs .btn{border:0;background:transparent;box-shadow:none}.tabs .active{color:var(--pd);background:#fff;box-shadow:0 5px 14px #1e412b18}.group,.person{padding:17px 3px;border-bottom:1px solid #e9efeb}.group:last-child,.person:last-child{border:0}.empty{padding:36px 18px;text-align:center;color:var(--mu);background:#f8faf9;border:1px dashed #cbd9d0;border-radius:18px}.empty i{display:block;font-style:normal;font-size:2.1rem;margin-bottom:7px}.footer{display:flex;gap:9px;flex-wrap:wrap;margin-top:20px;padding-top:19px;border-top:1px solid var(--ln)}
@media(max-width:640px){.wrap{width:min(100% - 20px,920px);padding-top:10px}.hero{padding:27px 23px;border-radius:24px}.card{padding:22px 18px;border-radius:22px}.form-grid{grid-template-columns:1fr}.full{grid-column:auto}.share{grid-template-columns:1fr}.share .btn{width:100%}.footer .btn,.actions .btn{flex:1}}
</style></head><body><main class="wrap">
<section class="hero"><span class="kicker">🥗 SALAD TOGETHER</span><h1>단체 주문 관리</h1><p>주문방을 만들고 팀의 메뉴를 한눈에 취합하세요.</p><a class="btn" href="index.html">← 추천 화면으로</a></section>
<section id="setup" class="card notice hidden"><strong>Firebase 설정이 필요합니다.</strong><br><code>firebase-config.js</code>의 프로젝트 설정값을 확인하세요.</section>
<section id="create" class="card"><div class="section-head"><div><h2>새 주문방 만들기</h2><p class="sub">매장과 담당자만 입력하면 바로 시작할 수 있어요.</p></div><span class="icon">＋</span></div><div class="form-grid"><div class="field full"><label>주문방 이름</label><input id="title" value="오늘 점심 주문" placeholder="예: CX팀 오늘 점심"></div><div class="field"><label>담당자 이름</label><input id="manager" maxlength="20" placeholder="이름 입력"></div><div class="field"><label>주문 매장</label><select id="store"></select></div><div class="field full"><label>참여자 안내사항 (선택)</label><textarea id="notice" maxlength="300" placeholder="예: 요청사항이 있으면 함께 입력해주세요."></textarea></div></div><button id="make" class="btn primary wide">주문방 만들기 →</button></section>
<section id="dash" class="hidden"><section class="card room"><div class="room-head"><div><span id="statusPill" class="status">● 주문 접수 중</span><h2 id="roomTitle"></h2></div><span class="icon">🔗</span></div><div id="roomInfo" class="meta"></div><div class="field"><label>참여 링크</label><div class="share"><input id="share" readonly><button id="copyLink" class="btn primary">링크 복사</button></div></div><div class="actions"><button id="closeRoom" class="btn danger">주문 접수 마감</button></div></section>
<section class="card"><div class="section-head"><div><h2>실시간 주문 현황</h2><p class="sub">참여자가 제출하면 자동으로 반영됩니다.</p></div><span class="icon">📋</span></div><div class="tabs"><button id="byMenu" class="btn active">메뉴별 보기</button><button id="byPerson" class="btn">참여자별 보기</button></div><div id="stats"></div><div id="orders"></div><div class="footer"><button id="copyOrder" class="btn primary">주문서 복사</button><button id="csv" class="btn">CSV 다운로드</button></div></section></section></main>
<script type="module">
import{initializeApp}from'https://www.gstatic.com/firebasejs/12.1.0/firebase-app.js';import{getAuth,signInAnonymously}from'https://www.gstatic.com/firebasejs/12.1.0/firebase-auth.js';import{getDatabase,ref,set,update,onValue}from'https://www.gstatic.com/firebasejs/12.1.0/firebase-database.js';import{firebaseConfig}from'./firebase-config.js';import{STORES}from'./menu-data.js';
const $=x=>document.getElementById(x),fmt=n=>n.toLocaleString('ko-KR')+'원';let db,user,roomId,info,orders=[],mode='menu';const configured=!firebaseConfig.apiKey.includes('PASTE_');if(!configured)$('setup').classList.remove('hidden');$('store').innerHTML=STORES.map(s=>`<option value="${s.id}">${s.name}</option>`).join('');
async function start(){if(!configured)return;try{let app=initializeApp(firebaseConfig);db=getDatabase(app);user=(await signInAnonymously(getAuth(app))).user;roomId=localStorage.getItem('salad.manager.room');if(roomId)watch()}catch(e){$('setup').classList.remove('hidden');$('setup').innerHTML=`<strong>Firebase 연결 오류</strong><br>${e.code||e.message}`}}
function code(){return Math.random().toString(36).slice(2,8).toUpperCase()}
async function make(){try{if(!configured)return alert('Firebase 설정이 필요합니다.');let store=STORES.find(s=>s.id===$('store').value),manager=$('manager').value.trim();if(!manager)return alert('담당자 이름을 입력하세요.');roomId=code();await set(ref(db,`saladOrders/rooms/${roomId}/info`),{title:$('title').value.trim()||'오늘 점심 주문',managerUid:user.uid,managerName:manager,storeId:store.id,storeName:store.name,status:'open',notice:$('notice').value.trim(),createdAt:Date.now()});localStorage.setItem('salad.manager.room',roomId);watch()}catch(e){alert(`주문방 생성 실패: ${e.code||e.message}`)}}
function watch(){onValue(ref(db,`saladOrders/rooms/${roomId}/info`),s=>{info=s.val();if(info)show()});onValue(ref(db,`saladOrders/rooms/${roomId}/orders`),s=>{orders=Object.values(s.val()||{}).filter(x=>x.status==='submitted');render()})}
function show(){$('create').classList.add('hidden');$('dash').classList.remove('hidden');$('roomTitle').textContent=info.title;$('statusPill').textContent=info.status==='open'?'● 주문 접수 중':'● 주문 마감';$('roomInfo').innerHTML=`<span class="chip">🏪 ${info.storeName}</span><span class="chip">👤 담당 ${info.managerName}</span>`;$('share').value=new URL(`index.html?room=${roomId}`,location.href).href;$('closeRoom').disabled=info.status!=='open'}
function grouped(){let g={};orders.forEach(o=>{g[o.menuName]??={qty:0,total:0,people:[]};g[o.menuName].qty++;g[o.menuName].total+=o.price;g[o.menuName].people.push(o)});return g}
function empty(){return '<div class="empty"><i>🥗</i><strong>아직 제출된 주문이 없어요</strong><br>참여 링크를 공유하면 주문이 여기에 모입니다.</div>'}
function render(){$('stats').innerHTML=`<div class="summary"><small>현재 주문 현황</small><div class="summary-row"><strong>참여 ${orders.length}명</strong><b>${fmt(orders.reduce((a,o)=>a+o.price,0))}</b></div></div>`;$('orders').innerHTML=mode==='menu'?(Object.entries(grouped()).map(([n,g])=>`<div class="group"><strong>${n} · ${g.qty}개 · ${fmt(g.total)}</strong><br>${g.people.map(o=>`${o.name}${o.request?' — '+o.request:''}`).join('<br>')}</div>`).join('')||empty()):(orders.map(o=>`<div class="person"><strong>${o.name}</strong><br>${o.menuName} · ${fmt(o.price)}${o.request?'<br>요청: '+o.request:''}</div>`).join('')||empty())}
function text(){let a=[`[${info.title}]`,info.storeName,''];Object.entries(grouped()).forEach(([n,g])=>{a.push(`${n} ${g.qty}개`);g.people.filter(o=>o.request).forEach(o=>a.push(`- ${o.name}: ${o.request}`));a.push('')});a.push(`총 ${orders.length}개 / ${fmt(orders.reduce((x,o)=>x+o.price,0))}`);return a.join('\n')}
function csv(){let q=v=>'"'+String(v??'').replaceAll('"','""')+'"',rows=[['이름','매장','메뉴','가격','칼로리','단백질','요청사항'],...orders.map(o=>[o.name,o.storeName,o.menuName,o.price,o.calories,o.protein,o.request])],blob=new Blob(['\ufeff'+rows.map(r=>r.map(q).join(',')).join('\n')],{type:'text/csv;charset=utf-8'}),a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download=`salad-order-${roomId}.csv`;a.click()}
$('make').onclick=make;$('copyLink').onclick=()=>navigator.clipboard.writeText($('share').value);$('closeRoom').onclick=()=>confirm('주문 접수를 마감할까요?')&&update(ref(db,`saladOrders/rooms/${roomId}/info`),{status:'closed'});$('copyOrder').onclick=()=>navigator.clipboard.writeText(text());$('csv').onclick=csv;$('byMenu').onclick=()=>{mode='menu';$('byMenu').classList.add('active');$('byPerson').classList.remove('active');render()};$('byPerson').onclick=()=>{mode='person';$('byPerson').classList.add('active');$('byMenu').classList.remove('active');render()};start();
</script></body></html>
